<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Word Drop</title>
<style>
  /* ================= DESIGN TOKENS — one system, everything derives from here ================= */
  :root{
    --bg0:#05070d;            /* page behind the phone */
    --bg1:#0f1524;            /* app background top */
    --bg2:#161f33;            /* app background bottom */
    --surface:rgba(255,255,255,.055);
    --surface-border:rgba(255,255,255,.09);
    --ink:#eef2ff; --dim:#8d9ab8;
    --accent:#7dd87d; --accent-deep:#4da44d;
    --gold:#ffd54f; --gold-deep:#e0a800;
    --danger:#ff6b6b;
    --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:26px;
    --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:24px;
    --fs-num:34px; --fs-big:22px; --fs-md:15px; --fs-sm:12px; --fs-xs:10px;
    --shadow-panel:0 10px 30px -12px rgba(0,0,0,.6);
    --tile-face:linear-gradient(148deg,#fdf9ee 0%, #f2e9d3 55%, #e3d5b6 100%);
    --tile-ink:#43371f;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:var(--ink);
    background:var(--bg0);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }

  /* ============ THE PHONE STAGE: a fixed 396×800 logical screen, scaled to fit ============
     The layout is designed exactly once at this size. Any viewport — phone, pane, desktop —
     sees the whole stage uniformly scaled. Rows can never crush, clip, or rearrange. */
  #app{
    position:relative; overflow:hidden; flex:none;
    width:396px; height:800px;
    background:linear-gradient(172deg,var(--bg1),var(--bg2));
    display:flex; flex-direction:column;
    border-radius:34px; border:1px solid rgba(255,255,255,.09);
    box-shadow:0 40px 90px -30px rgba(0,0,0,.9), 0 0 0 8px #0a0d16;
    transform-origin:center center;
  }
  #app::before{ content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(340px 260px at 14% 4%, rgba(125,216,125,.08), transparent 62%),
      radial-gradient(420px 320px at 88% 96%, rgba(255,213,79,.06), transparent 62%),
      radial-gradient(300px 260px at 86% 10%, rgba(179,136,255,.06), transparent 62%); }
  #app::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(130% 100% at 50% 40%, transparent 55%, rgba(0,0,0,.45)); }

  /* ================= SHARED COMPONENTS ================= */
  button{ font-family:inherit; border:none; cursor:pointer; color:var(--ink); background:none; padding:0; }
  .panel{ background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--r-lg); }
  .chip{ display:inline-flex; align-items:center; gap:6px; background:var(--surface);
    border:1px solid var(--surface-border); border-radius:999px; padding:6px 13px;
    font-size:var(--fs-sm); color:var(--dim); }
  .chip b{ color:var(--ink); font-size:14px; font-variant-numeric:tabular-nums; }
  .btn-primary{ display:flex; align-items:center; justify-content:center; gap:8px;
    background:linear-gradient(150deg,var(--accent),var(--accent-deep)); color:#0c1e0c;
    border-radius:var(--r-md); font-size:17px; font-weight:800; padding:15px 22px; width:100%;
    box-shadow:0 5px 0 rgba(0,0,0,.35); }
  .btn-primary:active{ transform:translateY(2px); box-shadow:0 3px 0 rgba(0,0,0,.35); }
  .btn-gold{ background:linear-gradient(150deg,var(--gold),var(--gold-deep)); color:#3a2a00; }
  .btn-ghost{ background:var(--surface); border:1px solid var(--surface-border); color:var(--ink); }
  .iconbtn{ width:44px; height:44px; border-radius:50%; font-size:18px; flex:none;
    display:flex; align-items:center; justify-content:center; position:relative;
    background:var(--surface); border:1px solid var(--surface-border); text-decoration:none; color:var(--ink); }
  .iconbtn:active{ transform:scale(.92); }
  .iconbtn .cnt{ position:absolute; bottom:-3px; right:-3px; background:var(--accent); color:#0e2210;
    font-size:10px; font-weight:800; min-width:17px; height:17px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 3px; }
  .iconbtn.armed-danger{ background:rgba(255,107,107,.28); border-color:var(--danger); animation:dangerarm 1.1s infinite; }
  @keyframes dangerarm{ 50%{ box-shadow:0 0 12px rgba(255,107,107,.6); transform:scale(1.08); } }

  .scene{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
    padding:calc(14px + env(safe-area-inset-top)) 14px calc(12px + env(safe-area-inset-bottom)); z-index:1; }
  .scene.active{ display:flex; animation:scenein .35s; }
  @keyframes scenein{ from{ opacity:0; transform:translateY(12px) } }

  .overlay{ position:absolute; inset:0; z-index:100; display:none; flex-direction:column;
    align-items:center; justify-content:center; padding:26px;
    background:rgba(5,8,16,.86); backdrop-filter:blur(3px); }
  .overlay.active{ display:flex; animation:scenein .3s; }
  .card{ width:100%; max-width:300px; background:var(--bg2); border:1px solid var(--surface-border);
    border-radius:var(--r-xl); padding:var(--sp5); text-align:center;
    box-shadow:var(--shadow-panel); display:flex; flex-direction:column; gap:var(--sp3); }
  .card h2{ margin:0; font-size:26px; }
  .card .rowstat{ display:flex; justify-content:space-around; }
  .card .rowstat div{ font-size:var(--fs-sm); color:var(--dim); }
  .card .rowstat b{ display:block; font-size:22px; color:var(--gold); font-variant-numeric:tabular-nums; }

  #toast{ position:absolute; left:50%; bottom:96px; transform:translateX(-50%); background:#000d;
    padding:9px 16px; border-radius:999px; font-size:13px; opacity:0; transition:opacity .3s;
    z-index:300; pointer-events:none; white-space:nowrap; }

  /* ================= HOME ================= */
  #scene-home{ justify-content:center; gap:26px; overflow:hidden; }
  .bgdrift{ position:absolute; font-size:44px; font-weight:900; color:rgba(255,255,255,.045);
    pointer-events:none; animation:bgfloat 7s ease-in-out infinite; z-index:0; }
  @keyframes bgfloat{ 0%,100%{ transform:translateY(0) rotate(-6deg) } 50%{ transform:translateY(-26px) rotate(5deg) } }
  #homelogo{ text-align:center; z-index:1; }
  .logo-tiles{ display:flex; gap:8px; justify-content:center; }
  .logo-tiles .tile{ width:54px; height:58px; font-size:27px; position:relative; animation:logobob 2.6s ease-in-out infinite; }
  .logo-tiles .tile:nth-child(2){ animation-delay:.18s } .logo-tiles .tile:nth-child(3){ animation-delay:.36s }
  .logo-tiles .tile:nth-child(4){ animation-delay:.54s }
  @keyframes logobob{ 0%,100%{ transform:translateY(0) rotate(-1deg) } 50%{ transform:translateY(-8px) rotate(1.5deg) } }
  .logo-word{ margin-top:12px; font-size:40px; font-weight:900; letter-spacing:13px; padding-left:13px;
    color:var(--gold); text-shadow:0 4px 18px rgba(255,213,79,.35), 0 2px 0 rgba(0,0,0,.4); }
  #btn-play{ width:96px; height:96px; border-radius:50%; font-size:24px; font-weight:900;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0;
    background:linear-gradient(150deg,var(--accent),var(--accent-deep)); color:#0c1e0c;
    box-shadow:0 8px 0 rgba(0,0,0,.35), 0 0 34px rgba(125,216,125,.3); animation:playpulse 1.9s infinite; z-index:1; }
  #btn-play small{ font-size:11px; font-weight:800; opacity:.75; letter-spacing:1px; }
  @keyframes playpulse{ 50%{ box-shadow:0 8px 0 rgba(0,0,0,.35), 0 0 52px rgba(125,216,125,.55); transform:scale(1.04); } }
  #btn-play:active{ transform:scale(.92); }
  .home-pills{ display:flex; gap:8px; z-index:1; }
  .home-links{ display:flex; gap:14px; z-index:1; }
  #home-classic{ position:absolute; bottom:calc(10px + env(safe-area-inset-bottom)); font-size:11px; color:var(--dim); text-decoration:none; opacity:.6; }

  /* ================= GAME SCENE ================= */
  #scene-game{ padding-top:calc(10px + env(safe-area-inset-top)); gap:var(--sp2); }
  #topbar{ width:100%; display:flex; align-items:center; gap:var(--sp2); z-index:2; }
  #lvlchip{ font-weight:800; font-size:var(--fs-sm); letter-spacing:1px; color:var(--dim); }
  #lvlchip b{ color:var(--ink); font-size:15px; }
  #movesbox{ flex:1; text-align:center; }
  #movesbig{ font-size:var(--fs-num); font-weight:900; line-height:1; color:var(--ink);
    font-variant-numeric:tabular-nums; text-shadow:0 2px 10px rgba(0,0,0,.5); transition:color .3s; }
  #movesbig.low{ color:var(--danger); animation:movespulse 1s infinite; }
  @keyframes movespulse{ 50%{ transform:scale(1.12); } }
  #moveslabel{ font-size:var(--fs-xs); letter-spacing:2px; color:var(--dim); text-transform:uppercase; }

  #goalbar{ width:100%; height:26px; border-radius:999px; background:rgba(0,0,0,.4);
    border:1px solid var(--surface-border); position:relative; overflow:hidden; z-index:2; }
  #goalfill{ height:100%; width:0%; border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--gold));
    transition:width .5s cubic-bezier(.2,.8,.3,1.15); background-size:200% 100%; animation:flow 3s linear infinite; }
  @keyframes flow{ to{ background-position:-200% 0 } }
  #goaltext{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800; font-variant-numeric:tabular-nums; text-shadow:0 1px 3px #000; }
  #goalbar .star{ position:absolute; right:5px; top:50%; transform:translateY(-50%); font-size:15px;
    filter:grayscale(1) opacity(.5); transition:filter .3s, transform .3s; }
  #goalbar.done .star{ filter:none; transform:translateY(-50%) scale(1.25); }

  #cozyrow{ display:flex; gap:var(--sp2); z-index:2; }
  .pill{ font-size:var(--fs-sm); color:var(--dim); background:var(--surface); border:1px solid var(--surface-border);
    border-radius:999px; padding:4px 12px; white-space:nowrap; letter-spacing:1px; }
  .pill b{ color:var(--ink); }
  .pill.pop{ animation:slotpop .45s; border-color:rgba(255,213,79,.6); }
  .pill.done{ color:var(--accent); }

  #boardwrap{ position:relative; flex:1; min-height:0; width:100%;
    display:flex; align-items:center; justify-content:center; z-index:1; }
  #board{ position:relative;
    background-color:rgba(4,7,15,.55);
    background-image:radial-gradient(circle, rgba(255,255,255,.05) 2px, transparent 2.7px);
    background-size:48px 48px; background-position:-2px -2px;
    border-radius:var(--r-md); overflow:hidden;
    box-shadow:0 0 0 5px rgba(255,255,255,.04), 0 0 0 6px rgba(255,255,255,.06),
      0 30px 70px -24px rgba(0,0,0,.85), inset 0 2px 12px rgba(0,0,0,.55); }
  #board.danger{ animation:dangerpulse 1s infinite; }
  @keyframes dangerpulse{ 50%{ box-shadow:0 0 0 5px rgba(255,107,107,.35), 0 0 0 6px rgba(255,107,107,.5),
    0 30px 70px -24px rgba(0,0,0,.85), inset 0 2px 12px rgba(0,0,0,.55); } }

  /* -------- dock: the hand -------- */
  #dock{ width:100%; display:flex; align-items:flex-end; justify-content:center; gap:10px;
    background:var(--surface); border:1px solid var(--surface-border);
    border-radius:var(--r-xl); padding:10px 14px 12px; z-index:2; box-shadow:var(--shadow-panel); }
  .slotlabel{ display:block; text-align:center; font-size:9px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
  #currentwrap{ animation:curbob 2.4s ease-in-out infinite; }
  @keyframes curbob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-5px) } }
  #currentwrap .tile{ box-shadow:0 6px 0 #b3a685, 0 14px 22px -6px rgba(0,0,0,.55),
    inset 0 1.5px 0 rgba(255,255,255,.85), inset 0 -3px 4px rgba(150,128,86,.28); }
  #nextwrap{ text-align:center; }
  #nextwrap .tile{ opacity:.72; }

  /* -------- power bar: powerups are blocks, so they look and size like blocks -------- */
  #powerbar{ width:100%; display:flex; align-items:center; justify-content:center; gap:12px;
    padding:2px 0 4px; z-index:2; }
  .pslot{ width:44px; height:46px; border-radius:9px; background:rgba(0,0,0,.32);
    border:1.5px dashed rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:800; position:relative; cursor:pointer; opacity:.45;
    transition:transform .15s, box-shadow .15s; }
  .pslot .req{ position:absolute; bottom:2px; left:0; right:0; text-align:center; font-size:8px;
    font-weight:800; color:var(--dim); letter-spacing:.5px; }
  .pslot.has .req{ display:none; }
  .pslot.has{ opacity:1; border:none;
    background:var(--tile-face); color:var(--tile-ink); text-shadow:0 1px 0 rgba(255,255,255,.55);
    box-shadow:0 4px 0 #b3a685, 0 5px 7px rgba(0,0,0,.3),
      inset 0 1.5px 0 rgba(255,255,255,.85), inset 0 -3px 4px rgba(150,128,86,.28); }
  #ps-wild.has{ background:linear-gradient(148deg,#cfb3ff,#9a67ff 55%,#6a3de0); color:#fff; text-shadow:0 1px 2px rgba(40,0,90,.6);
    box-shadow:0 4px 0 #4527a0, 0 5px 7px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.5), inset 0 -3px 4px rgba(60,20,140,.4); }
  #ps-bomb.has{ background:linear-gradient(148deg,#5a5a64,#33333b 55%,#1d1d23); color:#ff8a5c; text-shadow:0 1px 2px #000;
    box-shadow:0 4px 0 #101013, 0 5px 7px rgba(0,0,0,.35), inset 0 1.5px 0 rgba(255,255,255,.15), inset 0 -3px 4px rgba(0,0,0,.5); }
  #ps-oracle.has{ background:linear-gradient(148deg,#e6d9ff,#b9a3f0 55%,#7c5fd0); color:#2a1b52; text-shadow:0 1px 0 rgba(255,255,255,.4);
    box-shadow:0 4px 0 #4a3690, 0 5px 7px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.8), inset 0 -3px 4px rgba(70,50,140,.35); }
  #ps-swap.has{ background:linear-gradient(148deg,#d9f4ff,#a8dcf5 55%,#74b4dd); color:#173a52;
    box-shadow:0 4px 0 #3e6f91, 0 5px 7px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.9), inset 0 -3px 4px rgba(40,90,130,.35); }
  .pslot.armed{ box-shadow:0 0 16px rgba(255,213,79,.75), 0 4px 0 #b3a685!important; transform:scale(1.12) translateY(-3px); }
  .pslot .cnt{ position:absolute; top:-5px; right:-5px; background:var(--gold); color:#3a2a00;
    font-size:10px; font-weight:800; min-width:17px; height:17px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 4px rgba(0,0,0,.4); }
  .pslot.pop{ animation:slotpop .45s; }
  .pslot.deny{ animation:denyshake .32s; }
  .tile.selswap{ transform:scale(1.08)!important; box-shadow:0 0 18px #74b4dd, 0 4px 0 #b3a685; filter:brightness(1.2); z-index:5; }

  /* -------- targeting mode: armed powers announce themselves -------- */
  #modeaura{ position:absolute; inset:0; pointer-events:none; z-index:3; opacity:0; transition:opacity .25s; border-radius:var(--r-md); }
  #modeaura.on{ opacity:1; }
  #modechip{ position:absolute; left:50%; top:8px; transform:translateX(-50%); z-index:60; display:none;
    align-items:center; gap:8px; background:rgba(0,0,0,.85); border:1.5px solid var(--gold);
    border-radius:999px; padding:7px 8px 7px 16px; font-size:14px; font-weight:800; letter-spacing:1px;
    color:var(--ink); white-space:nowrap; animation:bannerin .25s; box-shadow:0 8px 20px rgba(0,0,0,.5); }
  #modechip.on{ display:flex; }
  #modechip .mx{ width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,.14);
    display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer; }

  /* -------- grove visitor: your collection plays with you -------- */
  #visitor{ position:absolute; top:-8px; right:6px; z-index:50; font-size:30px; cursor:pointer; display:none;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.6)); animation:visitorbob 3s ease-in-out infinite; }
  #visitor.here{ display:block; }
  @keyframes visitorbob{ 0%,100%{ transform:translateY(0) rotate(-3deg) } 50%{ transform:translateY(-6px) rotate(3deg) } }
  #visitor.bless{ animation:visitorjump .9s; }
  @keyframes visitorjump{ 0%{ transform:translateY(0) } 25%{ transform:translateY(-26px) scale(1.3) rotate(-8deg) }
    50%{ transform:translateY(0) scale(1) } 70%{ transform:translateY(-12px) rotate(6deg) } 100%{ transform:translateY(0) } }
  #iv-visitor{ font-size:13px; color:var(--dim); }
  #iv-visitor b{ font-size:20px; }
  .movesfloat{ position:absolute; z-index:90; font-size:22px; font-weight:900; color:var(--accent); pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,.7); animation:floatup 1s forwards; }
  @keyframes floatup{ to{ transform:translateY(-34px); opacity:0 } }
  @keyframes slotpop{ 40%{ transform:scale(1.4) rotate(8deg) } }
  @keyframes denyshake{ 25%{transform:translateX(-4px)} 50%{transform:translateX(4px)} 75%{transform:translateX(-2px)} }

  /* ================= TILES (engine classes — do not rename) ================= */
  .tw{ position:absolute; will-change:transform; transition:transform .22s cubic-bezier(.3,1.2,.5,1); }
  .tw > .tile{ width:100%; height:100%; }
  .tile{ display:flex; align-items:center; justify-content:center;
    background:var(--tile-face); color:var(--tile-ink); border-radius:9px; font-weight:800; overflow:hidden;
    text-shadow:0 1px 0 rgba(255,255,255,.55);
    box-shadow:0 4px 0 #b3a685, 0 5px 7px rgba(0,0,0,.3),
      inset 0 1.5px 0 rgba(255,255,255,.85), inset 0 -3px 4px rgba(150,128,86,.28); }
  .tile small{ position:absolute; bottom:1px; right:4px; font-size:9px; font-weight:700; color:#8d8064; }
  .tile.gold{ background:linear-gradient(148deg,#ffefb0,#ffd54f 55%,#f5a800);
    box-shadow:0 4px 0 #a97a00, 0 5px 8px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.9),
      inset 0 -3px 4px rgba(160,110,0,.35), 0 0 12px rgba(255,213,79,.45); }
  .tile.wild{ background:linear-gradient(148deg,#cfb3ff,#9a67ff 55%,#6a3de0); color:#fff; text-shadow:0 1px 2px rgba(40,0,90,.6);
    box-shadow:0 4px 0 #4527a0, 0 5px 8px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.5), inset 0 -3px 4px rgba(60,20,140,.4); }
  .tile.bomb{ background:linear-gradient(148deg,#5a5a64,#33333b 55%,#1d1d23); color:#ff8a5c; text-shadow:0 1px 2px #000;
    box-shadow:0 4px 0 #101013, 0 5px 8px rgba(0,0,0,.35), inset 0 1.5px 0 rgba(255,255,255,.15), inset 0 -3px 4px rgba(0,0,0,.5); }
  .tile.shift{ background:linear-gradient(148deg,#d9f4ff,#a8dcf5 55%,#74b4dd); color:#173a52;
    box-shadow:0 4px 0 #3e6f91, 0 5px 8px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.9), inset 0 -3px 4px rgba(40,90,130,.35); }
  .tile.stone{ background:linear-gradient(148deg,#8a8f99,#5f6570 55%,#3f444d); font-size:22px!important;
    box-shadow:0 4px 0 #23262c, 0 5px 8px rgba(0,0,0,.4), inset 0 1.5px 0 rgba(255,255,255,.25), inset 0 -3px 4px rgba(0,0,0,.45); }
  .tile.stone.cracked{ filter:brightness(.7) saturate(.7);
    background-image:linear-gradient(148deg,#8a8f99,#5f6570 55%,#3f444d),
      repeating-linear-gradient(37deg, transparent 0 7px, rgba(0,0,0,.5) 7px 8.5px); background-blend-mode:multiply; }
  .tile.ice{ background:linear-gradient(148deg,rgba(226,244,255,.92),rgba(168,214,240,.88) 55%,rgba(120,175,214,.85));
    color:rgba(23,58,82,.55); text-shadow:none;
    box-shadow:0 4px 0 #4a7fa3, 0 5px 8px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.95), inset 0 -3px 6px rgba(60,120,170,.4); }
  .tile.ice::before{ content:"❄"; position:absolute; top:1px; left:4px; font-size:10px; color:rgba(30,90,140,.8); }
  .tile.crate{ background:linear-gradient(148deg,#e8c58a,#c99a55 55%,#9c6f33); font-size:22px!important;
    box-shadow:0 4px 0 #6b4a1e, 0 5px 8px rgba(0,0,0,.35), inset 0 1.5px 0 rgba(255,255,255,.55), inset 0 -3px 4px rgba(110,75,30,.5); }
  .tile.thawpop{ animation:thawpop .55s; }
  @keyframes thawpop{ 40%{ transform:scale(1.18); filter:brightness(1.8) } }
  #iv-obstacles{ font-size:14px; color:var(--dim); letter-spacing:3px; }
  .tile.ghost{ position:absolute; opacity:.38; transition:none; box-shadow:none; background:rgba(246,241,227,.18);
    border:2px dashed rgba(255,255,255,.55); color:#fff; text-shadow:none; }
  .tile::after{ content:""; position:absolute; inset:0; border-radius:9px; pointer-events:none;
    background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.65) 50%,transparent 68%);
    background-size:250% 100%; background-position:200% 0; }
  .tile.glint::after{ animation:glint .75s; }
  @keyframes glint{ from{ background-position:200% 0 } to{ background-position:-60% 0 } }
  .tile.breathe{ animation:breathe .7s; }
  @keyframes breathe{ 50%{ transform:scale(1.05); filter:brightness(1.14); } }
  .tile.lit{ transform:scale(1.1)!important; box-shadow:0 0 20px var(--gold); filter:brightness(1.45); z-index:5; }

<div id="app">
  <!-- ============ HOME ============ -->
  <div class="scene active" id="scene-home">
    <div class="bgdrift" style="left:12%;top:16%;animation-delay:0s">E</div>
    <div class="bgdrift" style="left:78%;top:24%;animation-delay:2.2s">S</div>
    <div class="bgdrift" style="left:22%;top:66%;animation-delay:1.1s">O</div>
    <div class="bgdrift" style="left:70%;top:74%;animation-delay:3.4s">T</div>
    <div id="homelogo">
      <div class="logo-tiles">
        <div class="tile">W<small>4</small></div><div class="tile">O<small>1</small></div>
        <div class="tile">R<small>1</small></div><div class="tile">D<small>2</small></div>
      </div>
      <div class="logo-word">DROP</div>
    </div>
    <button id="btn-play" onclick="Game.play()">▶<small id="play-lvl">LV 1</small></button>
    <div class="home-pills">
      <span class="chip">🔥 <b id="hm-streak">0</b></span>
      <span class="chip" id="hm-quest">🌤️</span>
    </div>
    <div class="home-links">
      <button class="iconbtn" id="btn-grove" onclick="UI.groveShow()">🌳<span class="cnt" id="grove-badge">0</span></button>
      <button class="iconbtn" onclick="UI.statsShow()">📊</button>
      <button class="iconbtn soundbtn" onclick="Snd.toggle()">🔊</button>
    </div>
    <a id="home-classic" href="word-run.html">classic mode 🧩</a>
  </div>

  <!-- ============ GAME ============ -->
  <div class="scene" id="scene-game">
    <div id="topbar">
      <button class="iconbtn" style="width:40px;height:40px;font-size:15px" onclick="Game.goHome()">🏠</button>
      <button class="iconbtn" style="width:40px;height:40px;font-size:15px" id="btn-restart" onclick="Game.restartBtn()">↻</button>
      <div id="movesbox"><div id="movesbig">15</div><div id="moveslabel">moves</div></div>
      <span id="lvlchip" class="chip">LV <b id="h-level">1</b></span>
      <button class="iconbtn soundbtn" style="width:40px;height:40px;font-size:15px" onclick="Snd.toggle()">🔊</button>
    </div>
    <div id="goalbar"><div id="goalfill"></div><div id="goaltext">0 / 60</div><span class="star">⭐</span></div>
    <div id="cozyrow"><span class="pill" id="quest"></span><span class="pill" id="giftmeter"></span></div>
    <div id="boardwrap">
      <div id="board"><div id="modeaura"></div></div>
      <div id="modechip"></div>
      <div id="visitor" onclick="UI.visitorPeek()"></div>
    </div>
    <div id="dock">
      <div id="currentwrap"></div>
      <div id="nextwrap"><span class="slotlabel">next</span><span id="nextslot"></span></div>
    </div>
    <div id="powerbar">
      <div class="pslot" id="ps-swap" onclick="Game.usePower('swap')">⇄<span class="req">3</span><span class="cnt">0</span></div>
      <div class="pslot" id="ps-wild" onclick="Game.usePower('wild')">★<span class="req">4+</span><span class="cnt">0</span></div>
      <div class="pslot" id="ps-bomb" onclick="Game.usePower('bomb')">💣<span class="req">5+</span><span class="cnt">0</span></div>
      <div class="pslot" id="ps-oracle" onclick="Game.usePower('oracle')">🔮<span class="req">×3</span><span class="cnt">0</span></div>
      <div class="pslot" id="ps-transmute" onclick="Game.usePower('transmute')">🔄<span class="req">⭐+</span><span class="cnt">0</span></div>
    </div>
  </div>

  <!-- ============ GROVE ============ -->
  <div class="scene" id="scene-grove">
    <div id="grovetitle">🌳 <b id="gr-count">0/40</b> &nbsp;·&nbsp; 📅 <b id="gr-daily">?</b></div>
    <div id="grovefield"></div>
    <button class="iconbtn" onclick="UI.scene('scene-home')">←</button>
  </div>

  <div class="overlay" id="ov-intro" onclick="Game.beginLevel()">
    <div class="card">
      <div id="iv-level">LEVEL 1</div>
      <div id="iv-goals">
        <div>🎯 target<b id="iv-target">60</b></div>
        <div>🔻 moves<b id="iv-moves">15</b></div>
      </div>
      <div id="iv-obstacles" style="display:none"></div>
      <div id="iv-visitor" style="display:none"></div>
      <div id="iv-tap">TAP TO PLAY</div>
    </div>
  </div>

  <div class="overlay" id="ov-end">
    <div class="card">
      <h2 id="ev-title">Level clear!</h2>
      <div class="rowstat">
        <div>score<b id="ev-score">0</b></div>
        <div>best word<b id="ev-word" style="font-size:15px">—</b></div>
      </div>
      <div id="ev-grove"></div>
      <div class="buttons">
        <button class="btn-primary btn-gold" id="btn-moves" onclick="Game.extraMoves()">🪶 +5 moves</button>
        <button class="btn-primary" id="btn-next" onclick="Game.nextLevel()">▶ Next level</button>
        <button class="btn-primary btn-ghost" id="btn-retry" onclick="Game.retryLevel()">↻ Retry</button>
      </div>
      <div class="minirow">
        <button class="iconbtn" onclick="Game.share()">📤</button>
        <button class="iconbtn" onclick="Game.goHome()">🏠</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="m-stats" onclick="UI.statsHide(event)">
    <div class="card">
      <div class="statgrid">
        <div class="stat">⭐<b id="st-level">1</b></div>
        <div class="stat">🏁<b id="st-wins">0</b></div>
        <div class="stat">🗣<b id="st-words">0</b></div>
        <div class="stat">🔥<b id="st-streak">0</b></div>
        <div class="stat">⛓<b id="st-chain">×1</b></div>
        <div class="stat">👑<b id="st-word" style="font-size:14px">—</b></div>
      </div>
      <button class="btn-primary" onclick="UI.statsHide()">✓</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

const COLS=7, ROWS=8, CELL=44, GAP=4, STEP=CELL+GAP;
const VAL = {a:1,b:3,c:3,d:2,e:1,f:4,g:2,h:4,i:1,j:8,k:5,l:1,m:3,n:1,o:1,p:3,q:10,r:1,s:1,t:1,u:1,v:4,w:4,x:8,y:4,z:10};
const FREQ = "aaaaaaaaabbcccddddeeeeeeeeeeeeffggghhiiiiiiiiijkllllmmnnnnnnooooooooppqrrrrrrssssssttttttuuuuvwwxyyz";

const MIN_LEN = 3;
function TARGET(L){ return Math.round(40*Math.pow(1.12,L-1)/5)*5; }
function MOVES(L){ return 15; }
function recipe(L){ // each level opens with a different board problem
  return {
    stone: L>=3 ? Math.min(3, 1+Math.floor((L-3)/3)) : 0,
    ice:   L>=5 ? Math.min(3, 1+Math.floor((L-5)/4)) : 0,
    crate: (L>=4 && L%3===1) ? 1 : 0,
  };
}

const Snd = {
  ctx:null, master:null, wet:null, on:true, ambientTimer:null,
  init(){
    if(this.ctx) { if(this.ctx.state==="suspended") this.ctx.resume(); return; }
    const C = window.AudioContext||window.webkitAudioContext; if(!C) { this.on=false; return; }
    this.ctx = new C();
    const comp = this.ctx.createDynamicsCompressor();
    comp.threshold.value=-18; comp.ratio.value=6;
    this.master = this.ctx.createGain(); this.master.gain.value=0.9;
    this.master.connect(comp); comp.connect(this.ctx.destination);
    const len = this.ctx.sampleRate*1.8, ir = this.ctx.createBuffer(2,len,this.ctx.sampleRate);
    for(let ch=0;ch<2;ch++){ const d=ir.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6); }
    const conv = this.ctx.createConvolver(); conv.buffer=ir;
    this.wet = this.ctx.createGain(); this.wet.gain.value=0.32;
    this.wet.connect(conv); conv.connect(this.master);
    this.startAmbient();
  },
  toggle(){ this.on=!this.on; P.sound=this.on; save();
    document.querySelectorAll(".soundbtn").forEach(el=>el.textContent = this.on?"🔊":"🔇");
    if(this.on) this.init(); },
  now(){ return this.ctx.currentTime; },
  tone(freq, o){
    if(!this.on||!this.ctx) return; o=o||{};
    const t0=this.now()+(o.when||0), dur=o.dur||0.15;
    const osc=this.ctx.createOscillator(), g=this.ctx.createGain();
    osc.type=o.type||"sine"; osc.frequency.setValueAtTime(freq,t0);
    if(o.slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(o.slideTo,1),t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(o.gain||0.1, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(this.master);
    if(o.verb) g.connect(this.wet);
    osc.start(t0); osc.stop(t0+dur+0.05);
  },
  noise(o){
    if(!this.on||!this.ctx) return; o=o||{};
    const t0=this.now()+(o.when||0), dur=o.dur||0.15;
    const len=Math.max(1,this.ctx.sampleRate*dur), buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=this.ctx.createBufferSource(); src.buffer=buf;
    let node=src;
    if(o.lp){ const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=o.lp; node.connect(f); node=f; }
    if(o.hp){ const f=this.ctx.createBiquadFilter(); f.type="highpass"; f.frequency.value=o.hp; node.connect(f); node=f; }
    const g=this.ctx.createGain(); g.gain.value=o.gain||0.08;
    node.connect(g); g.connect(this.master);
    if(o.verb) g.connect(this.wet);
    src.start(t0);
  },
  PENTA:[262,294,330,392,440,523,587,659,784,880,1047,1175],
  hover(col){ this.tone(300+col*36, {dur:.04, type:"triangle", gain:.018}); },
  whoosh(){ this.noise({dur:.22, gain:.05, lp:900}); },
  land(row){ const f = 120 + (ROWS-1-row)*22;
    this.tone(f,{dur:.13,type:"sine",gain:.22}); this.noise({dur:.05,gain:.1,hp:2000}); },
  riser(chain){ this.tone(180*chain,{dur:.32,type:"sawtooth",gain:.045,slideTo:180*chain*3,verb:true}); },
  collapse(n){ for(let i=0;i<Math.min(n,7);i++) this.noise({dur:.04,gain:.05,hp:900,when:i*0.045}); },
  chainBig(chain){
    [0,4,7,12].forEach((st,i)=>this.tone(262*Math.pow(2,(st+chain*2)/12),{dur:.35,type:"triangle",gain:.12,when:i*0.09,verb:true}));
    this.noise({dur:.5,gain:.06,lp:1200,verb:true}); },
  bomb(){ this.noise({dur:.09,gain:.09,hp:3000}); this.tone(55,{dur:.5,type:"sine",gain:.3,when:.05}); this.noise({dur:.4,gain:.16,lp:300,when:.05}); },
  gold(){ [1568,2093,2637].forEach((f,i)=>this.tone(f,{dur:.12,type:"square",gain:.04,when:i*0.06,verb:true})); },
  crack(shatter){ this.noise({dur:.08,gain:.12,hp:600});
    if(shatter){ this.noise({dur:.25,gain:.1,lp:900,when:.05}); this.tone(160,{dur:.2,type:"triangle",gain:.1,when:.03}); } },
  thaw(){ this.tone(1200,{dur:.18,type:"sine",gain:.07,slideTo:1800,verb:true}); this.noise({dur:.12,gain:.05,hp:3000}); },
  levelUp(){ [262,330,392,523,659,784].forEach((f,i)=>this.tone(f,{dur:.28,type:"triangle",gain:.13,when:i*0.09,verb:true})); this.noise({dur:.6,gain:.05,lp:1500,verb:true,when:.3}); },
  fail(){ [392,330,262,196].forEach((f,i)=>this.tone(f,{dur:.34,type:"triangle",gain:.12,when:i*0.17,verb:true})); },
  earn(){ this.tone(1047,{dur:.1,type:"square",gain:.05,verb:true}); this.tone(1319,{dur:.16,type:"square",gain:.05,when:.08,verb:true}); },
  discover(){ [523,659,784,1047,1319,1568].forEach((f,i)=>this.tone(f,{dur:.4,type:"sine",gain:.09,when:i*0.09,verb:true}));
    this.tone(2093,{dur:.8,type:"sine",gain:.04,when:.55,verb:true}); },
  danger(){ this.tone(70,{dur:.18,type:"sine",gain:.14}); this.tone(70,{dur:.14,type:"sine",gain:.1,when:.25}); },
  reject(){ this.tone(140,{dur:.18,type:"sawtooth",gain:.09}); },
  startAmbient(){
    clearInterval(this.ambientTimer);
    this.ambientTimer = setInterval(()=>{
      if(!this.on||!this.ctx||!S||S.over||S.busy) return;
      if(Math.random()<0.65){
        const n=this.PENTA[Math.floor(Math.random()*6)];
        this.tone(n/2,{dur:1.2,type:"sine",gain:.014,verb:true});
      }
    }, 3200);
  },
};

/* =================== PERSISTENCE (v2: level-based) =================== */
let S = null;
function load(){
  const defaults = {level:1, sound:true, streak:0, lastDay:0, dailyWordDay:-1, grove:{}, bestWord:"",
    pow:{wild:1,bomb:1,oracle:1,transmute:2,swap:1},
    stats:{wins:0, words:0, bestChain:1},
    questDay:-1, questProgress:0, questDone:false, giftWords:0, coach:false, run:null };
  try{
    let p = JSON.parse(localStorage.getItem("worddrop_v2"));
    if(!p){ // migrate the parts worth keeping from v1
      const v1 = JSON.parse(localStorage.getItem("worddrop_v1")||"null");
      if(v1){ p = { sound:v1.sound, streak:v1.streak, lastDay:v1.lastDay, dailyWordDay:v1.dailyWordDay,
        grove:v1.grove, bestWord:v1.bestWord,
        stats:{wins:0, words:(v1.stats&&v1.stats.words)||0, bestChain:(v1.stats&&v1.stats.bestChain)||1} }; }
    }
    const out = Object.assign({}, defaults, p||{});
    out.stats = Object.assign({}, defaults.stats, out.stats||{});
    out.pow = Object.assign({}, defaults.pow, out.pow||{});
    if(out.pow.laser){ out.pow.oracle=(out.pow.oracle||0)+out.pow.laser; delete out.pow.laser; } // laser retired → oracle
    out.grove = out.grove||{};
    return out;
  }catch(e){ return defaults; }
}
let P = load();
function save(){ try{ localStorage.setItem("worddrop_v2",JSON.stringify(P)); }catch(e){} }
function saveRun(){
  if(!S || S.over){ P.run=null; save(); return; }
  P.run={ level:S.level, board:S.board.map(row=>row.map(t=>t?{l:t.letter,k:t.kind,x:t.cracks||0}:null)),
    cur:S.cur, next:S.next, movesLeft:S.movesLeft, levelScore:S.levelScore,
    drops:S.drops, revived:S.revived, bestWord:S.bestWord, bestWordPts:S.bestWordPts,
    maxChain:S.maxChain, newGrove:S.newGrove, visitor:S.visitor };
  save();
}
function loadRun(){
  const r=P.run;
  if(!r || !r.cur || r.level!==P.level) return false;
  try{
    boardEl.innerHTML="";
    S=newState(r.level);
    Object.assign(S,{ movesLeft:r.movesLeft, levelScore:r.levelScore, drops:r.drops,
      revived:!!r.revived, bestWord:r.bestWord||"", bestWordPts:r.bestWordPts||0,
      maxChain:r.maxChain||1, newGrove:r.newGrove||[], cur:r.cur, next:r.next, visitor:r.visitor||null });
    r.board.forEach((row,ri)=>row.forEach((cell,ci)=>{
      if(!cell) return;
      const t=newTile(cell.l,cell.k,ri,ci);
      if(cell.x){ t.cracks=cell.x; t.inner.classList.add("cracked"); }
    }));
    S.busy=false; // resumed runs skip the intro card, so unfreeze directly
    S.lastAction=Date.now();
    UI.all(); UI.visitor();
    return true;
  }catch(e){ P.run=null; save(); return false; }
}

/* =================== STATE =================== */
function newState(level){
  return { level, board:Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    tiles:{}, seq:0, levelScore:0, target:TARGET(level), movesLeft:MOVES(level),
    drops:0, chain:1, maxChain:1, cascadeMax:1,
    deadDrops:0, nudging:false, idleNudges:0, lastAction:Date.now(), clearedThisDrop:false,
    usingPower:null, swapSel:null, revived:false, won:false, newGrove:[], visitor:null,
    bestWord:"", bestWordPts:0, cur:null, next:null,
    over:false, busy:true, hoverCol:3, killers:{} };
}
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
function drawLetter(){
  let letters=0, vowels=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ const t=S.board[r][c]; if(t&&t.kind==="normal"){ letters++; if(VOWELS.has(t.letter)) vowels++; } }
  if(letters>4 && vowels/letters<0.25 && Math.random()<0.5) return rand(["a","e","i","o"]);
  return FREQ[Math.floor(Math.random()*FREQ.length)];
}
function makePiece(){
  const roll=Math.random();
  if(roll<0.02)  return {letter:drawLetter(), kind:"shift"};
  if(roll<0.14)  return {letter:riggedLetter(), kind:"gold"};
  return {letter:riggedLetter(), kind:"normal"};
}

/* =================== BOARD DOM =================== */
const $ = id=>document.getElementById(id);
const boardEl = $("board");
boardEl.style.width = (COLS*STEP-GAP)+"px";
boardEl.style.height = (ROWS*STEP-GAP)+"px";
function xy(r,c){ return "translate("+(c*STEP)+"px,"+(r*STEP)+"px)"; }
function tileFace(t){
  if(t.kind==="bomb") return "💣";
  if(t.kind==="wild") return "★";
  if(t.kind==="stone") return "🪨";
  if(t.kind==="crate") return "🎁";
  const val = (t.kind==="ice") ? "" : "<small>"+VAL[t.letter]+"</small>";
  return t.letter.toUpperCase()+val;
}
function makeTileEl(t){
  const outer=document.createElement("div");
  outer.className="tw";
  outer.style.width=CELL+"px"; outer.style.height=CELL+"px";
  const el=document.createElement("div");
  el.className="tile "+(t.kind!=="normal"?t.kind:"");
  el.style.fontSize="20px";
  el.style.transform="rotate("+(Math.random()*2.6-1.3).toFixed(2)+"deg)";
  el.innerHTML = tileFace(t);
  outer.appendChild(el);
  boardEl.appendChild(outer);
  return {outer, inner:el};
}
const NONWORD = new Set(["bomb","stone","crate","ice"]); // these break words apart
function placeTile(t,r,c,instant){
  t.r=r; t.c=c;
  if(instant){ t.el.style.transition="none"; t.el.style.transform=xy(r,c); void t.el.offsetWidth; t.el.style.transition=""; }
  else t.el.style.transform=xy(r,c);
}
function newTile(letter,kind,r,c,instant){
  const t={ id:"d"+(++S.seq), letter, kind:kind||"normal", r, c };
  const m=makeTileEl(t);
  t.el=m.outer; t.inner=m.inner;
  placeTile(t,r,c,instant!==false);
  S.tiles[t.id]=t; S.board[r][c]=t;
  return t;
}
function removeTile(t){
  delete S.tiles[t.id];
  if(S.board[t.r] && S.board[t.r][t.c]===t) S.board[t.r][t.c]=null;
  t.inner.classList.add("popout");
  UI.shards(t.r, t.c, t.kind==="gold"?"#ffd54f":t.kind==="wild"?"#b388ff":"#f6f1e3");
  setTimeout(()=>t.el.remove(), 320);
}
function boardFull(){ for(let c=0;c<COLS;c++) if(!S.board[0][c]) return false; return true; }

/* =================== WORD SCAN =================== */
function cellsToPattern(cells){ return cells.map(t=>t.kind==="wild"?".":t.letter).join(""); }
function matchPattern(pat){
  if(!pat.includes(".")) return COMMON.has(pat) ? pat : null;
  const list = BY_LEN[pat.length]||[], re = new RegExp("^"+pat+"$");
  for(const w of list) if(re.test(w)) return w;
  return null;
}
function scanLine(cellsLine){
  const found=[]; let seg=[];
  const flush=()=>{
    let pos=0;
    while(pos <= seg.length-MIN_LEN){
      let hit=null;
      for(let L=Math.min(seg.length-pos,8); L>=MIN_LEN; L--){
        const cells=seg.slice(pos,pos+L);
        if(cells.every(t=>t.kind==="wild")) continue;
        const w=matchPattern(cellsToPattern(cells));
        if(w){ hit={cells,word:w}; break; }
      }
      if(hit){ found.push(hit); pos += hit.cells.length; }
      else pos++;
    }
    seg=[];
  };
  cellsLine.forEach(t=>{ if(t && !NONWORD.has(t.kind)) seg.push(t); else flush(); });
  flush();
  return found;
}
/* words read like English: left→right and top→bottom. never backwards —
   with swap/transmute/oracle for deliberate construction, backward clears
   are illegible surprises that steal agency, not forgiveness. */
function findWords(){
  const found=[], seen=new Set();
  const push=h=>{
    const key=h.cells.map(t=>t.id).sort().join(",");
    if(seen.has(key)) return;
    seen.add(key); found.push(h);
  };
  for(let r=0;r<ROWS;r++) scanLine(S.board[r]).forEach(push);
  for(let c=0;c<COLS;c++) scanLine(S.board.map(row=>row[c])).forEach(push);
  return found;
}
function wouldClear(piece, c){
  if(piece.kind==="bomb") return null;
  if(S.board[0][c]) return null;
  let land=ROWS-1; while(land>=0 && S.board[land][c]) land--;
  const fake={ id:"fake", letter:piece.kind==="wild"?"?":piece.letter, kind:piece.kind==="wild"?"wild":"normal", r:land, c };
  S.board[land][c]=fake;
  const words=[...scanLine(S.board[land]), ...scanLine(S.board.map(row=>row[c]))];
  S.board[land][c]=null;
  let best=null;
  for(const w of words) if(w.cells.includes(fake) && (!best || w.word.length>best.length)) best=w.word;
  return best;
}
function helpfulByLength(){
  const best={};
  for(let c=0;c<COLS;c++){
    if(S.board[0][c]) continue;
    for(const l of "abcdefghijklmnopqrstuvwxyz"){
      const w=wouldClear({letter:l,kind:"normal"},c);
      if(w && w.length>(best[l]||0)) best[l]=w.length;
    }
  }
  return best;
}
const PRE=(()=>{ const s=new Set();
  COMMON.forEach(w=>{ if(w.length>=4) for(let i=2;i<w.length;i++) s.add(w.slice(0,i)); });
  return s; })();
function builderLetters(){
  const out=new Set();
  for(let c=0;c<COLS;c++){
    if(S.board[0][c]) continue;
    let land=ROWS-1; while(land>=0&&S.board[land][c]) land--;
    let below="";
    for(let r=land+1;r<Math.min(ROWS,land+4);r++){ const t=S.board[r][c]; if(!t||t.kind!=="normal"&&t.kind!=="gold") break; below+=t.letter; }
    let left="";
    for(let cc=c-1;cc>=0&&c-cc<=3;cc--){ const t=S.board[land][cc]; if(!t||t.kind!=="normal"&&t.kind!=="gold") break; left=t.letter+left; }
    for(const l of "abcdefghijklmnopqrstuvwxyz"){
      if(below && PRE.has((l+below).slice(0,4))) out.add(l);
      if(left && PRE.has(left+l)) out.add(l);
    }
  }
  return [...out];
}
function riggedLetter(){
  /* HONEST DECK. Mercy exists but is rare — your placement has to do the work.
     Builders only make long words POSSIBLE; they never complete anything for you. */
  if(!S) return drawLetter();
  const best=helpfulByLength();
  const longs=Object.keys(best).filter(l=>best[l]>=4);
  if(longs.length && Math.random()<0.30) return rand(longs);
  if(Object.keys(best).length && Math.random()<0.15) return rand(Object.keys(best));
  const b=builderLetters();
  if(b.length && Math.random()<0.35) return rand(b);
  return drawLetter();
}

      const t=S.board[rr][cc]; if(t) removeTile(t);
    }
    S.levelScore += 10; UI.hud();
    await wait(340);
    await Game.gravity();
  },

  async stirShifters(){
    const shifts=Object.values(S.tiles).filter(t=>t.kind==="shift");
    if(!shifts.length) return;
    shifts.forEach((t,i)=>{
      setTimeout(()=>{
        t.inner.classList.add("shiftspin");
        Snd.tone(600+i*120,{dur:.14,type:"triangle",gain:.06,verb:true});
        setTimeout(()=>{
          t.letter=drawLetter();
          t.inner.innerHTML = t.letter.toUpperCase()+"<small>"+VAL[t.letter]+"</small>";
        },270);
        setTimeout(()=>t.inner.classList.remove("shiftspin"),560);
      }, i*110);
    });
    await wait(shifts.length*110+620);
    S.chain=1;
    await Game.resolve();
  },

  async resolve(){
    const words = findWords();
    if(!words.length) return;
    S.clearedThisDrop = true;
    if(S.chain>=2){
      const cb=document.createElement("div"); cb.className="chainburst";
      cb.textContent="CHAIN ×"+S.chain+"!";
      $("boardwrap").appendChild(cb); setTimeout(()=>cb.remove(),950);
      Snd.chainBig(S.chain); buzz([30,40,30,80]);
      if(S.chain>=3) UI.confetti();
      await wait(400);
    }
    const allCells = new Set();
    let gained=0;
    for(const w of words){
      const len=w.cells.length;
      let pts=0;
      w.cells.forEach(t=>{ let v = t.kind==="wild"?0:VAL[t.letter]; if(t.kind==="gold") v*=3; pts+=v; });
      pts = Math.round(pts * (1+0.5*(len-3)) * S.chain);
      gained += pts;
      const banner=document.createElement("div"); banner.className="wordbanner";
      banner.style.fontSize = Math.min(16+len*2, 28)+"px";
      boardEl.appendChild(banner); // lives INSIDE the board frame — cannot collide with HUD or pills
      const base = Math.min(4+(S.chain-1)*2, Snd.PENTA.length-len);
      for(let i=0;i<len;i++){
        const t=w.cells[i];
        t.inner.classList.add("lit"); allCells.add(t);
        banner.textContent = w.word.slice(0,i+1).toUpperCase();
        Snd.tone(Snd.PENTA[Math.min(base+i,Snd.PENTA.length-1)]*(0.995+Math.random()*0.01),
          {dur:.18,type:"triangle",gain:.12,verb:true});
        buzz(8);
        await wait(165);
      }
      banner.textContent = w.word.toUpperCase()+"  +"+pts+(S.chain>=2 ? "  ×"+S.chain : "");
      banner.classList.add("done");
      Snd.tone(Snd.PENTA[Math.min(base+len,Snd.PENTA.length-1)]*2,{dur:.32,type:"sine",gain:.06,verb:true});
      if(pts>S.bestWordPts){ S.bestWordPts=pts; S.bestWord=w.word.toUpperCase(); }
      if(len>=5){ Game.earn("bomb"); UI.confetti(); }
      else if(len>=4) Game.earn("wild");
      else Game.earn("swap"); // 3-letter words are fuel: they buy you board rearrangement
      if(len>=4 && S.visitor && !S.visitor.used){ S.visitor.used=true; Game.visitorBless(); }
      Game.recordWord(w, pts);
      await wait(700);
      banner.classList.add("fade"); setTimeout(()=>banner.remove(),450);
    }
    S.maxChain=Math.max(S.maxChain,S.chain);
    S.cascadeMax=Math.max(S.cascadeMax,S.chain);
    if(S.chain>=2){ boardEl.classList.add("flash"); setTimeout(()=>boardEl.classList.remove("flash"),400); }
    S.levelScore += gained;
    UI.hud();
    await wait(150);
    const clearedPos=[...allCells].map(t=>({r:t.r,c:t.c}));
    allCells.forEach(t=>removeTile(t));
    Snd.collapse(allCells.size);
    await wait(220);
    await Game.hitNeighbors(clearedPos);
    await Game.gravity();
    // one honest rain tile: cascade potential, never a gift
    await Game.rain(1);
    S.chain++;
    Snd.riser(S.chain);
    await wait(430);
    await Game.resolve();
  },

  async hitNeighbors(cells){ // clearing beside stone cracks it, beside ice thaws it, beside a crate pops it
    const seen=new Set(); let acted=false;
    for(const p of cells){
      for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
        const r=p.r+d[0], c=p.c+d[1];
        if(r<0||r>=ROWS||c<0||c>=COLS) continue;
        const t=S.board[r][c];
        if(!t || seen.has(t.id)) continue;
        seen.add(t.id);
        if(t.kind==="stone"){
          acted=true;
          t.cracks=(t.cracks||0)+1;
          if(t.cracks>=2){ removeTile(t); S.levelScore+=5; Snd.crack(true); }
          else {
            t.inner.classList.add("cracked");
            t.inner.classList.add("jostle"); setTimeout(()=>t.inner.classList.remove("jostle"),220);
            Snd.crack(false);
          }
          buzz(15);
        } else if(t.kind==="ice"){
          acted=true;
          t.kind="normal";
          t.inner.className="tile thawpop"; t.inner.innerHTML=tileFace(t);
          setTimeout(()=>t.inner.classList.remove("thawpop"),560);
          UI.shards(t.r,t.c,"#a8dcf5");
          Snd.thaw(); buzz(10);
        } else if(t.kind==="crate"){
          acted=true;
          removeTile(t);
          Game.earn(rand(["swap","wild","bomb","oracle","transmute"]));
          Snd.gold(); buzz([15,25]);
        }
      }
    }
    if(acted){ UI.hud(); await wait(340); }
  },

  async rain(count){
    for(let i=0;i<count;i++){
      const open=[];
      for(let c=0;c<COLS;c++){ let land=ROWS-1; while(land>=0&&S.board[land][c])land--; if(land>=2) open.push({c,land}); }
      if(!open.length) return;
      const p=open[Math.floor(Math.random()*open.length)];
      const t=newTile(drawLetter(),"normal",p.land,p.c,false);
      t.el.style.transition="none"; t.el.style.transform=xy(-1.2,p.c); void t.el.offsetWidth;
      const ms=70+p.land*32;
      t.el.style.transition="transform "+ms+"ms cubic-bezier(.55,0,.85,.55)";
      t.el.style.transform=xy(p.land,p.c);
      Snd.tone(520+Math.random()*260,{dur:.06,type:"triangle",gain:.045});
      await wait(ms);
      t.el.style.transition="";
      t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
      UI.dust(p.land,p.c);
    }
    await wait(160);
  },

  async gravity(){
    let moved=false;
    for(let c=0;c<COLS;c++){
      const stack=[];
      for(let r=ROWS-1;r>=0;r--){ const t=S.board[r][c]; if(t) stack.push(t); S.board[r][c]=null; }
      stack.forEach((t,i)=>{
        const nr=ROWS-1-i;
        const dist = nr - t.r;
        const falling = dist>0;
        if(falling) moved=true;
        S.board[nr][c]=t; t.r=nr; t.c=c;
        setTimeout(()=>{
          if(falling){ t.el.style.transition="transform "+(90+dist*55)+"ms cubic-bezier(.55,0,.85,.6)"; }
          t.el.style.transform=xy(nr,c);
          if(falling) setTimeout(()=>{ t.el.style.transition="";
            t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
          }, 90+dist*55);
        }, i*24);
      });
    }
    if(moved) await wait(340);
  },
};
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* =================== UI =================== */
const UI = {

    document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));

  },
  home(){
    $("play-lvl").textContent = "LV "+P.level;
    $("hm-streak").textContent=P.streak||0;

    $("hm-quest").textContent=q.emoji + (P.questDone?" ✓":"");
    $("hm-quest").title=q.text;
    $("grove-badge").textContent=Object.keys(P.grove).length;
  },
  hud(){
    $("h-level").textContent=S.level;
    const m=$("movesbig");
    m.textContent=S.movesLeft;

    $("goaltext").textContent=S.levelScore+" / "+S.target;

  },
  miniTile(t, size, font){
    const el=document.createElement("div");
    el.className="tile "+(t.kind!=="normal"?t.kind:"");

    el.textContent=(t.kind==="bomb"?"💣":t.kind==="wild"?"★":t.letter.toUpperCase());
    return el;
  },
  piece(){
    const w=$("currentwrap"); w.innerHTML="";
    // an armed drop-power rides the next drop — show it AS the current block
    const armedDrop = S.usingPower && POWERS[S.usingPower] && POWERS[S.usingPower].type==="drop";
    const t = armedDrop ? {letter:POWERS[S.usingPower].icon, kind:S.usingPower} : S.cur;
    const el=UI.miniTile(t,62,29);
    if(!armedDrop && t.kind!=="bomb"&&t.kind!=="wild") el.innerHTML += "<small>"+VAL[t.letter]+"</small>";
    w.appendChild(el);
    const n=$("nextslot"); n.innerHTML="";
    n.appendChild(UI.miniTile(S.next,44,19));
  },
  cozy(){
    const q=dailyQuest();
    const qe=$("quest");
    qe.classList.toggle("done", P.questDone);
    qe.innerHTML = P.questDone ? q.emoji+" ✓" : q.emoji+" <b>"+Math.min(q.target,P.questProgress)+"</b>/"+q.target;
    qe.title = q.text;
    const into=((P.giftWords % 5)+5)%5;
    $("giftmeter").innerHTML = "🎁 "+"●".repeat(into)+"○".repeat(5-into);
  },
  pillPop(id){
    const el=$(id);
    el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
    setTimeout(()=>el.classList.remove("pop"),500);
  },
  endCard(won){
    $("ev-title").textContent = won ? "Level "+S.level+" clear! 🎉" : (S.levelScore>=S.target*0.85 ? "So close…" : "Out of moves");
    $("ev-score").textContent = S.levelScore + " / " + S.target;
    $("ev-word").textContent = S.bestWord||"—";
    $("ev-grove").textContent = S.newGrove.map(w=>GROVE_BY_WORD[w].e).join(" ");
    $("btn-next").style.display = won ? "flex":"none";
    $("btn-retry").style.display = won ? "none":"flex";
    $("btn-moves").style.display = (!won && !S.revived && S.levelScore>0 && !boardFull()) ? "flex":"none";
    $("ov-end").classList.add("active");
  },
  visitor(){
    const el=$("visitor");
    if(S && S.visitor){ el.textContent=S.visitor.e; el.title=S.visitor.w.toUpperCase(); el.classList.add("here"); }
    else el.classList.remove("here");
  },
  visitorPeek(){ // tap the visitor: it hops and reminds you what it wants
    if(!S || !S.visitor) return;
    const el=$("visitor");
    el.classList.remove("bless"); void el.offsetWidth; el.classList.add("bless");
    Snd.tone(880,{dur:.1,type:"triangle",gain:.06,verb:true});
  },
  discover(g){
    Snd.discover(); buzz([30,50,30,50,90]);
    UI.confetti();
    const b=document.createElement("div"); b.className="discovery";
    b.innerHTML = '<span class="dEmoji">'+g.e+'</span><span class="dSub">joins your grove</span>';
    $("app").appendChild(b);
    setTimeout(()=>b.remove(), 2100);
  },
  groveShow(){
    $("gr-count").textContent = Object.keys(P.grove).length+"/"+GROVE.length;
    $("gr-daily").textContent = P.dailyWordDay===Math.floor(Date.now()/864e5) ? "✓" : "?";
    const f=$("grovefield"); f.innerHTML="";
    const hash=w=>{ let h=0; for(const c of w) h=(h*31+c.charCodeAt(0))>>>0; return h; };
    let missing=0;
    GROVE.forEach(g=>{
      if(P.grove[g.w]){
        const el=document.createElement("div"); el.className="grovemoji";
        el.textContent=g.e; el.title=g.w.toUpperCase();
        const h=hash(g.w);
        el.style.left = (6 + h%84)+"%";
        el.style.top = g.z==="sky" ? (4 + (h>>3)%26)+"%" : (48 + (h>>5)%40)+"%";
        el.style.animationDelay = ((h>>7)%40)/10+"s";
        el.style.fontSize = (22 + (h>>9)%10)+"px";
        f.appendChild(el);
      } else missing++;
    });
    const strip=document.createElement("div"); strip.id="grovemissing";
    strip.textContent = "❔".repeat(Math.min(missing, GROVE.length));
    f.appendChild(strip);
    UI.scene("scene-grove");
  },
  statsShow(){
    $("st-level").textContent=P.level;
    $("st-wins").textContent=P.stats.wins;
    $("st-words").textContent=P.stats.words;
    $("st-streak").textContent=P.streak||0;
    $("st-chain").textContent="×"+P.stats.bestChain;
    $("st-word").textContent=P.bestWord||"—";
    $("m-stats").classList.add("active");
  },
  statsHide(e){
    if(e && e.target.closest(".card") && e.target.tagName!=="BUTTON") return;
    $("m-stats").classList.remove("active");
  },
  nudge(){
    if(!S || S.busy || S.over || S.won || S.nudging) return;
    S.nudging=true;
    UI.hints();
    setTimeout(()=>{
      S.nudging=false;
      document.querySelectorAll(".killcell").forEach(e=>{ e.style.opacity=0; setTimeout(()=>e.remove(),520); });
      const ct=document.querySelector("#currentwrap .tile"); if(ct) ct.classList.remove("glint");
      S.killers={};
    }, 2400);
  },
  hadKillers:false,
  hints(){
    S.killers={};
    document.querySelectorAll(".killcell").forEach(e=>e.remove());
    const piece = S.usingPower==="wild" ? {letter:"★",kind:"wild"} : S.cur;
    const reveal = S.nudging || S.usingPower==="wild";
    const scanning = reveal && !S.over && !S.won && !S.busy && (!S.usingPower || S.usingPower==="wild");
    if(scanning){
      for(let c=0;c<COLS;c++){
        const w=wouldClear(piece,c);
        if(w){
          S.killers[c]=w;
          let land=ROWS-1; while(land>=0 && S.board[land][c]) land--;
          const m=document.createElement("div"); m.className="killcell";
          m.style.width=CELL+"px"; m.style.height=CELL+"px";
          m.style.left=(c*STEP)+"px"; m.style.top=(land*STEP)+"px";
          boardEl.appendChild(m);
        }
      }
    }
    const n=Object.keys(S.killers).length;
    if(n && !UI.hadKillers){
      Snd.tone(1319,{dur:.14,type:"sine",gain:.05,verb:true});
      Snd.tone(1760,{dur:.2,type:"sine",gain:.04,when:.09,verb:true});
    }
    UI.hadKillers = n>0;
  },
  tray(){
    ["swap","wild","bomb","oracle","transmute"].forEach(k=>{
      const el=$("ps-"+k);
      el.querySelector(".cnt").textContent=P.pow[k];
      el.classList.toggle("has", P.pow[k]>0);
      el.classList.toggle("armed", S && S.usingPower===k);
    });
  },
  shards(r,c,color){
    for(let i=0;i<6;i++){
      const s=document.createElement("div"); s.className="shard";
      s.style.background=color;
      s.style.left=(c*STEP+CELL/2)+"px"; s.style.top=(r*STEP+CELL/2)+"px";
      s.style.setProperty("--dx",(Math.random()*110-55)+"px");
      s.style.setProperty("--dy",(Math.random()*-90-15)+"px");
      boardEl.appendChild(s); setTimeout(()=>s.remove(),580);
    }
  },
  dust(r,c){
    for(let i=0;i<4;i++){
      const d=document.createElement("div"); d.className="dust";
      d.style.left=(c*STEP + 6 + Math.random()*(CELL-12))+"px";
      d.style.top=(r*STEP + CELL - 6)+"px";
      d.style.setProperty("--dx",(Math.random()*44-22)+"px");
      d.style.setProperty("--dy",(-6-Math.random()*16)+"px");
      boardEl.appendChild(d); setTimeout(()=>d.remove(),480);
    }
  },
  ghostEl:null,
  ghost(col){
    if(this.ghostEl){ if(this.ghostEl._label) this.ghostEl._label.remove(); this.ghostEl.remove(); this.ghostEl=null; }
    if(!S || col<0 || S.over || S.won || S.busy) return;
    if(S.usingPower==="transmute" || S.usingPower==="swap") return; // these target tiles, not columns
    if(S.board[0][col]) return;
    let land=ROWS-1; while(land>=0 && S.board[land][col]) land--;
    const g=document.createElement("div");
    g.className="tile ghost"; g.style.width=CELL+"px"; g.style.height=CELL+"px"; g.style.fontSize="20px";
    const pk=S.usingPower;
    g.textContent = pk==="bomb"?"💣" : pk==="wild"?"★"
      : (S.cur.kind==="bomb"?"💣":S.cur.kind==="wild"?"★":S.cur.letter.toUpperCase());
    g.style.transform=xy(land,col);
    boardEl.appendChild(g); this.ghostEl=g;
    if(S.killers[col]){
      const dl=document.createElement("div"); dl.className="droplabel";
      dl.textContent = S.killers[col].toUpperCase();
      dl.style.left=(col*STEP+CELL/2)+"px"; dl.style.top=(land*STEP)+"px";
      boardEl.appendChild(dl); g._label=dl;
    }
  },
  toast(m){ const t=$("toast"); t.textContent=m; t.style.opacity=1; clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity=0,1500); },
  confetti(){
    const colors=["#7dd87d","#ffd54f","#4fc3f7","#ff8a5c","#b388ff"];
    for(let i=0;i<24;i++){ const c=document.createElement("div"); c.className="confetti";
      c.style.left=Math.random()*100+"%"; c.style.background=colors[i%colors.length];
      c.style.animationDelay=(Math.random()*0.3)+"s";
      $("app").appendChild(c); setTimeout(()=>c.remove(),1900); }
  },
  all(){ UI.hud(); UI.piece(); UI.hints(); UI.tray(); UI.cozy(); },
};

/* =================== LAYOUT & INPUT =================== */
function fitBoard(){
  const wrap=$("boardwrap");
  if(!wrap.clientWidth) return;
  const bw=COLS*STEP-GAP, bh=ROWS*STEP-GAP;
  const k=Math.min(1.1, (wrap.clientWidth-4)/bw, (wrap.clientHeight-14)/bh);
  boardEl.style.transform="scale("+k+")";
  boardEl.style.transformOrigin="center center";
}
function fitApp(){ // scale the fixed 396×800 stage to whatever screen we're on
  const k=Math.min(1, innerWidth/396, innerHeight/800);
  $("app").style.transform = k<1 ? "scale("+k+")" : "";
}
window.addEventListener("resize", ()=>{ fitApp(); fitBoard(); });
function colFromEvent(e){
  const r=boardEl.getBoundingClientRect();
  const x=e.clientX-r.left;
  if(x<0||x>r.width) return -1;
  return Math.max(0,Math.min(COLS-1,Math.floor(x/(r.width/COLS))));
}
boardEl.addEventListener("pointermove", e=>{
  if(!S) return;
  const c=colFromEvent(e);
  if(c>=0 && c!==S.hoverCol){ Snd.hover(c); }
  S.hoverCol=c; UI.ghost(c);
});
boardEl.addEventListener("pointerleave", ()=>UI.ghost(-1));
boardEl.addEventListener("pointerdown", e=>{ if(!S) return; const c=colFromEvent(e); S.hoverCol=c; UI.ghost(c); });
boardEl.addEventListener("pointerup", e=>{
  if(!S) return;
  if(S.usingPower==="transmute" || S.usingPower==="swap"){
    const r=boardEl.getBoundingClientRect();
    const col=Math.max(0,Math.min(COLS-1,Math.floor((e.clientX-r.left)/(r.width/COLS))));
    const row=Math.max(0,Math.min(ROWS-1,Math.floor((e.clientY-r.top)/(r.height/ROWS))));
    if(!S.busy && !S.over && !S.won){
      if(S.usingPower==="transmute") Game.transmuteAt(row,col);
      else Game.swapAt(row,col);
    }
    return;
  }
  const c=colFromEvent(e);
  if(c>=0) Game.drop(c);
});
document.addEventListener("pointerdown", ()=>Snd.init(), {once:true});

/* idle life */
setInterval(()=>{
  if(!S || S.over || S.won || S.busy) return;
  if(!$("scene-game").classList.contains("active")) return;
  const tiles = Object.values(S.tiles);
  if(!tiles.length) return;
  const t = tiles[Math.floor(Math.random()*tiles.length)];
  const fx = Math.random()<0.5 ? "glint" : "breathe";
  t.inner.classList.add(fx);
  setTimeout(()=>t.inner.classList.remove(fx), 780);
}, 2400);

/* stuck nudge — onboarding only: after level 2 the player is on their own */
setInterval(()=>{
  if(!S || S.level>2 || S.over || S.won || S.busy || S.nudging || S.idleNudges>=2) return;
  if(!$("scene-game").classList.contains("active")) return;
  if(Date.now()-S.lastAction > 8000){
    S.idleNudges++;
    S.lastAction = Date.now();
    UI.nudge();
  }
}, 1000);

/* boot */
fitApp();
UI.home();
document.querySelectorAll(".soundbtn").forEach(el=>el.textContent = P.sound?"🔊":"🔇");
Snd.on = P.sound;
window.S = ()=>S; window.Game=Game; window.UI=UI; window.Snd=Snd; window.P=P;
</script>
