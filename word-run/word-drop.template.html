<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Word Drop</title>
<style>
  :root{
    --bg1:#101624; --bg2:#1b2438; --accent:#7dd87d; --gold:#ffd54f;
    --tile:#f6f1e3; --tile-text:#2b2417; --ink:#eef2ff; --dim:#9aa7c4;
    --card:#212c45; --danger:#ff6b6b;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:var(--ink);
    background:linear-gradient(170deg,var(--bg1),var(--bg2));
    overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  #app{ max-width:420px; height:100%; margin:0 auto; position:relative; display:flex; flex-direction:column;
        align-items:center; padding:calc(8px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom)); }
  button{ font-family:inherit; border:none; border-radius:14px; cursor:pointer; color:var(--ink);
          background:var(--card); font-size:15px; padding:10px 16px; font-weight:600; }
  button:active{ transform:scale(.95); }

  #hud{ width:100%; display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--dim); }
  #hud b{ color:var(--ink); font-size:16px; }
  #score-big{ font-size:26px; font-weight:900; color:var(--gold); text-shadow:0 2px 8px rgba(0,0,0,.5); min-width:70px; text-align:center; }
  #chainlabel{ height:26px; font-weight:900; font-size:18px; color:var(--gold); text-shadow:0 2px 6px rgba(0,0,0,.6); }

  #piecebar{ display:flex; align-items:center; gap:14px; margin:6px 0; height:64px; }
  #nextwrap{ text-align:center; color:var(--dim); font-size:11px; }
  #nextwrap .tile{ transform:scale(.72); opacity:.8; }
  #holdwrap{ text-align:center; color:var(--dim); font-size:11px; cursor:pointer;
    border:1.5px dashed rgba(255,255,255,.18); border-radius:12px; padding:2px 8px 6px; }
  #holdwrap:active{ transform:scale(.93); }
  .holdempty{ display:inline-block; width:44px; height:46px; line-height:46px; font-size:20px; color:rgba(255,255,255,.25); }
  .killcell{ position:absolute; border:2.5px solid rgba(255,213,79,.7); border-radius:11px; pointer-events:none; z-index:4;
    animation:killcell 1.1s 2; opacity:0; box-shadow:inset 0 0 10px rgba(255,213,79,.2); transition:opacity .5s; }
  @keyframes killcell{ 0%,100%{ opacity:.3; transform:scale(.93) } 50%{ opacity:.95; transform:scale(1.02) } }
  .shimmer{ animation:shimmerp 1.4s infinite; }
  @keyframes shimmerp{ 50%{ box-shadow:0 3px 0 #b8ad93, 0 0 16px rgba(255,213,79,.75); } }
  #lvlbarwrap{ width:100%; margin:4px 0 2px; }
  #lvlbar{ height:13px; background:rgba(0,0,0,.35); border-radius:7px; overflow:hidden; position:relative; }
  #lvlfill{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:7px;
    transition:width .6s cubic-bezier(.2,.8,.3,1.2); background-size:200% 100%; animation:flowlv 3s linear infinite; }
  @keyframes flowlv{ to{ background-position:-200% 0 } }
  #lvltext{ position:absolute; inset:0; font-size:9px; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; text-shadow:0 1px 2px #000; }
  #tray{ display:flex; gap:10px; align-items:center; margin:2px 0 6px; height:48px; }
  .pslot{ width:44px; height:44px; border-radius:12px; background:rgba(0,0,0,.3); border:1.5px dashed rgba(255,255,255,.15);
    display:flex; align-items:center; justify-content:center; font-size:22px; position:relative; cursor:pointer; opacity:.4;
    transition:transform .15s, box-shadow .15s; }
  .pslot.has{ opacity:1; border-style:solid; border-color:rgba(255,213,79,.5); }
  .pslot.armed{ border-color:var(--gold); box-shadow:0 0 14px rgba(255,213,79,.65); transform:scale(1.1); }
  .pslot .cnt{ position:absolute; bottom:-5px; right:-5px; background:var(--gold); color:#3a2a00; font-size:11px; font-weight:800;
    width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .pslot.pop{ animation:slotpop .45s; }
  @keyframes slotpop{ 40%{ transform:scale(1.4) rotate(8deg) } }
  .shard{ position:absolute; width:7px; height:7px; border-radius:2px; z-index:15; pointer-events:none;
    animation:shardfly .55s ease-out forwards; }
  @keyframes shardfly{ to{ transform:translate(var(--dx),var(--dy)) rotate(220deg) scale(.2); opacity:0 } }
  .lvlbanner{ position:absolute; left:50%; top:40%; transform:translate(-50%,-50%); z-index:90; font-size:42px; font-weight:900;
    color:var(--gold); text-shadow:0 4px 20px rgba(0,0,0,.85); pointer-events:none; animation:lvlbn 1.6s forwards; white-space:nowrap; }
  @keyframes lvlbn{ 0%{ transform:translate(-50%,-50%) scale(.2); opacity:0 } 20%{ transform:translate(-50%,-50%) scale(1.2); opacity:1 }
    80%{ opacity:1; transform:translate(-50%,-50%) scale(1) } 100%{ opacity:0; transform:translate(-50%,-90%) scale(1) } }
  .flash{ animation:boardflash .4s; }
  @keyframes boardflash{ 30%{ filter:brightness(1.75) } }

  #boardwrap{ position:relative; flex:1; min-height:0; width:100%; display:flex; align-items:center; justify-content:center; }
  #board{ position:relative; background:rgba(0,0,0,.32); border-radius:14px; overflow:hidden;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.06), 0 10px 30px rgba(0,0,0,.35); }
  #board.danger{ animation:dangerpulse 1s infinite; }
  @keyframes dangerpulse{ 50%{ box-shadow:inset 0 0 0 3px rgba(255,107,107,.7), 0 10px 30px rgba(0,0,0,.35); } }
  .tw{ position:absolute; will-change:transform; transition:transform .22s cubic-bezier(.3,1.2,.5,1); }
  .tw > .tile{ width:100%; height:100%; }

  .tile{ display:flex; align-items:center; justify-content:center;
    background:linear-gradient(148deg,#fdf9ee 0%, #f2e9d3 55%, #e3d5b6 100%);
    color:#43371f; border-radius:9px; font-weight:800; overflow:hidden;
    text-shadow:0 1px 0 rgba(255,255,255,.55);
    box-shadow:0 4px 0 #b3a685, 0 5px 7px rgba(0,0,0,.3),
      inset 0 1.5px 0 rgba(255,255,255,.85), inset 0 -3px 4px rgba(150,128,86,.28); }
  .tile small{ position:absolute; bottom:1px; right:4px; font-size:9px; font-weight:700; color:#8d8064; }
  .tile.gold{ background:linear-gradient(148deg,#ffefb0,#ffd54f 55%,#f5a800);
    box-shadow:0 4px 0 #a97a00, 0 5px 8px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.9), inset 0 -3px 4px rgba(160,110,0,.35), 0 0 12px rgba(255,213,79,.45); }
  .tile.wild{ background:linear-gradient(148deg,#cfb3ff,#9a67ff 55%,#6a3de0); color:#fff; text-shadow:0 1px 2px rgba(40,0,90,.6);
    box-shadow:0 4px 0 #4527a0, 0 5px 8px rgba(0,0,0,.3), inset 0 1.5px 0 rgba(255,255,255,.5), inset 0 -3px 4px rgba(60,20,140,.4); }
  .tile.bomb{ background:linear-gradient(148deg,#5a5a64,#33333b 55%,#1d1d23); color:#ff8a5c; text-shadow:0 1px 2px #000;
    box-shadow:0 4px 0 #101013, 0 5px 8px rgba(0,0,0,.35), inset 0 1.5px 0 rgba(255,255,255,.15), inset 0 -3px 4px rgba(0,0,0,.5); }
  .tile.ghost{ position:absolute; opacity:.38; transition:none; box-shadow:none; background:rgba(246,241,227,.18);
    border:2px dashed rgba(255,255,255,.55); color:#fff; text-shadow:none; }
  .tile.jostle{ animation:jostle .2s; }
  @keyframes jostle{ 50%{ transform:scaleY(.88) translateY(7%); } }
  .dust{ position:absolute; width:5px; height:5px; border-radius:50%; background:rgba(230,220,190,.75);
    z-index:14; pointer-events:none; animation:dustfly .45s ease-out forwards; }
  @keyframes dustfly{ to{ transform:translate(var(--dx),var(--dy)) scale(.3); opacity:0 } }
  .tile.lit{ transform:scale(1.1)!important; box-shadow:0 0 20px var(--gold); filter:brightness(1.45); z-index:5; }
  .wordbanner{ position:absolute; left:50%; top:-34px; transform:translateX(-50%); z-index:40; pointer-events:none;
    background:rgba(0,0,0,.75); border:2px solid var(--gold); border-radius:14px; padding:6px 18px;
    font-size:24px; font-weight:900; letter-spacing:3px; color:var(--gold); white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,.8); animation:bannerin .2s; }
  .wordbanner.done{ color:#fff; border-color:var(--accent); }
  .wordbanner.fade{ transition:opacity .4s, transform .4s; opacity:0; transform:translateX(-50%) translateY(-16px); }
  @keyframes bannerin{ from{ transform:translateX(-50%) scale(.5); opacity:0 } }
  .tile.popout{ animation:popout .3s forwards; z-index:6; }
  @keyframes popout{ to{ transform:scale(0) rotate(25deg); opacity:0 } }
  .tile.landsquash{ animation:landsquash .38s; }
  @keyframes landsquash{
    0%{ transform:scaleY(1); }
    28%{ transform:scaleY(.64) scaleX(1.28) translateY(11%); }
    55%{ transform:translateY(-13%) scaleY(1.08) rotate(-1.8deg); }
    78%{ transform:translateY(2%) scaleY(.97) rotate(.9deg); }
    100%{ transform:none; }
  }

  .wordfloat{ position:absolute; font-weight:900; color:var(--gold); z-index:20; pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,.85); animation:wfloat 1.1s forwards; white-space:nowrap; }
  @keyframes wfloat{ 0%{ transform:translateY(0) scale(.6); opacity:0 } 18%{ opacity:1; transform:translateY(-8px) scale(1.12) }
    80%{ opacity:1 } 100%{ transform:translateY(-46px) scale(1); opacity:0 } }
  .chainburst{ position:absolute; left:50%; top:36%; transform:translate(-50%,-50%); font-size:38px; font-weight:900; z-index:30;
    color:var(--gold); text-shadow:0 4px 16px rgba(0,0,0,.7); pointer-events:none; animation:chainb .9s forwards; white-space:nowrap; }
  @keyframes chainb{ 0%{ transform:translate(-50%,-50%) scale(.2); opacity:0 } 30%{ transform:translate(-50%,-50%) scale(1.25); opacity:1 }
    70%{ opacity:1 } 100%{ transform:translate(-50%,-50%) scale(1.05) translateY(-20px); opacity:0 } }
  .shake{ animation:shake .4s; }
  @keyframes shake{ 20%{transform:translate(-7px,2px)} 40%{transform:translate(7px,-2px)} 60%{transform:translate(-4px,1px)} 80%{transform:translate(4px,-1px)} }
  .confetti{ position:absolute; width:9px; height:9px; top:-12px; z-index:60; pointer-events:none; animation:fall 1.4s ease-in forwards; }
  @keyframes fall{ to{ transform:translateY(105vh) rotate(720deg); opacity:.5 } }

  #meta{ width:100%; display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:12px; color:var(--dim); }
  #cozybar{ width:100%; min-height:32px; margin:2px 0 4px; padding:6px 10px; border-radius:11px;
    display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:11px;
    color:var(--dim); background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.06); }
  #cozybar b{ color:var(--gold); font-size:12px; }
  #quest{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #giftmeter{ white-space:nowrap; color:var(--accent); font-weight:700; }
  #holdwrap.swap{ animation:holdswap .42s ease-out; border-color:var(--gold); box-shadow:0 0 16px rgba(255,213,79,.55); }
  @keyframes holdswap{ 35%{ transform:scale(1.12) rotate(-3deg) } 70%{ transform:scale(.96) rotate(2deg) } }
  #risepips{ display:flex; gap:4px; }
  .pip{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.15); }
  .pip.on{ background:var(--gold); }
  #hint{ margin-top:6px; font-size:12px; color:var(--dim); text-align:center; min-height:16px; }

  #over{ position:absolute; inset:0; background:rgba(5,8,16,.88); display:none; flex-direction:column;
    align-items:center; justify-content:center; z-index:100; text-align:center; padding:24px; }
  #over.active{ display:flex; }
  #over h2{ font-size:32px; margin:0 0 4px; }
  .over-card{ background:var(--card); border-radius:14px; padding:12px 26px; margin:6px 0; }
  .over-card b{ font-size:24px; display:block; color:var(--gold); }
  .btn-big{ font-size:19px; padding:14px 26px; border-radius:16px; margin-top:14px;
    background:linear-gradient(135deg,var(--accent),#a8e6a1); color:#12240f; box-shadow:0 5px 0 rgba(0,0,0,.35); }
  #toast{ position:absolute; left:50%; bottom:70px; transform:translateX(-50%); background:#000c; padding:9px 16px;
    border-radius:18px; font-size:13px; opacity:0; transition:opacity .3s; z-index:200; pointer-events:none; white-space:nowrap; }
</style>

<div id="app">
  <div id="hud">
    <div>LEVEL <b id="h-level">1</b></div>
    <div id="score-big">0</div>
    <div>BEST <b id="h-best">0</b></div>
  </div>
  <div id="lvlbarwrap"><div id="lvlbar"><div id="lvlfill"></div><div id="lvltext"></div></div></div>
  <div id="chainlabel"></div>
  <div id="piecebar">
    <div id="currentwrap"></div>
    <div id="nextwrap">NEXT<br><span id="nextslot"></span></div>
    <div id="holdwrap" onclick="Game.hold()">HOLD<br><span id="holdslot"><span class="holdempty">－</span></span></div>
  </div>
  <div id="tray">
    <div class="pslot" id="ps-wild" onclick="Game.usePower('wild')">★<span class="cnt">0</span></div>
    <div class="pslot" id="ps-bomb" onclick="Game.usePower('bomb')">💣<span class="cnt">0</span></div>
    <div class="pslot" id="ps-laser" onclick="Game.usePower('laser')">⚡<span class="cnt">0</span></div>
    <span style="font-size:10px;color:var(--dim);line-height:1.5">earn them:<br>4-letter word → ★ · 5+ → 💣 · chain ×3 → ⚡</span>
  </div>
  <div id="cozybar"><span id="quest"></span><span id="giftmeter"></span></div>
  <div id="boardwrap"><div id="board"></div></div>
  <div id="meta">
    <span id="soundbtn" onclick="Snd.toggle()" style="cursor:pointer">🔊 sound</span>
    <div id="risepips"></div>
    <a href="word-run.html" style="color:var(--dim)">← classic mode</a>
  </div>
  <div id="hint">Tap a column to drop the letter. Words of 3+ clear & cascade!</div>

  <div id="over">
    <h2>Board Full!</h2>
    <div class="over-card">Score<b id="o-score">0</b></div>
    <div class="over-card">Best Word<b id="o-word" style="font-size:18px">—</b></div>
    <div class="over-card">Longest Chain<b id="o-chain">×1</b></div>
    <button class="btn-big" onclick="Game.restart()">↻ Drop Again</button>
    <button style="margin-top:10px;background:transparent;border:2px solid var(--card)" onclick="location.href='word-run.html'">← Classic mode</button>
  </div>
  <div id="toast"></div>
</div>

<script>
"use strict";
/* =================== DICTIONARY (curated common words) =================== */
const COMMON = new Set("__COMMON__".split(" "));
if(COMMON.size < 500){
  document.body.innerHTML = '<div style="padding:40px 24px;font-family:system-ui;text-align:center;color:#fff">'+
    '<h2>⚠️ This is the source template</h2><p>Run <code>node build.js</code> and open <b><a href="word-drop.html" style="color:#7dd87d">word-drop.html</a></b> instead.</p></div>';
  throw new Error("Template opened directly — open word-drop.html");
}
const BY_LEN = {}; // for wildcard matching
COMMON.forEach(w=>{ (BY_LEN[w.length] = BY_LEN[w.length]||[]).push(w); });

/* =================== CONSTANTS =================== */
const COLS=7, ROWS=8, CELL=44, GAP=4, STEP=CELL+GAP;
const VAL = {a:1,b:3,c:3,d:2,e:1,f:4,g:2,h:4,i:1,j:8,k:5,l:1,m:3,n:1,o:1,p:3,q:10,r:1,s:1,t:1,u:1,v:4,w:4,x:8,y:4,z:10};
const FREQ = "aaaaaaaaabbcccddddeeeeeeeeeeeeffggghhiiiiiiiiijkllllmmnnnnnnooooooooppqrrrrrrssssssttttttuuuuvwwxyyz";
const VOWELS = new Set(["a","e","i","o","u"]);
const RISE_EVERY = 10;
const MIN_LEN = 3;

/* =================== SOUND ENGINE =================== */
const Snd = {
  ctx:null, master:null, wet:null, on:true, ambientTimer:null, heartbeatTimer:null,
  init(){
    if(this.ctx) { if(this.ctx.state==="suspended") this.ctx.resume(); return; }
    const C = window.AudioContext||window.webkitAudioContext; if(!C) { this.on=false; return; }
    this.ctx = new C();
    const comp = this.ctx.createDynamicsCompressor();
    comp.threshold.value=-18; comp.ratio.value=6;
    this.master = this.ctx.createGain(); this.master.gain.value=0.9;
    this.master.connect(comp); comp.connect(this.ctx.destination);
    // procedural reverb (2s noise decay impulse)
    const len = this.ctx.sampleRate*1.8, ir = this.ctx.createBuffer(2,len,this.ctx.sampleRate);
    for(let ch=0;ch<2;ch++){ const d=ir.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6); }
    const conv = this.ctx.createConvolver(); conv.buffer=ir;
    this.wet = this.ctx.createGain(); this.wet.gain.value=0.32;
    this.wet.connect(conv); conv.connect(this.master);
    this.startAmbient();
  },
  toggle(){ this.on=!this.on; document.getElementById("soundbtn").textContent = this.on?"🔊 sound":"🔇 muted";
    if(this.on) this.init(); },
  now(){ return this.ctx.currentTime; },
  tone(freq, o){ // o: {dur,type,gain,when,slideTo,verb}
    if(!this.on||!this.ctx) return;
    o = o||{};
    const t0 = this.now()+(o.when||0), dur=o.dur||0.15;
    const osc=this.ctx.createOscillator(), g=this.ctx.createGain();
    osc.type=o.type||"sine"; osc.frequency.setValueAtTime(freq,t0);
    if(o.slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(o.slideTo,1),t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(o.gain||0.1, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(this.master);
    if(o.verb) g.connect(this.wet);
    osc.start(t0); osc.stop(t0+dur+0.05);
  },
  noise(o){ // {dur,gain,when,hp,lp}
    if(!this.on||!this.ctx) return;
    o=o||{};
    const t0=this.now()+(o.when||0), dur=o.dur||0.15;
    const len=Math.max(1,this.ctx.sampleRate*dur), buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=this.ctx.createBufferSource(); src.buffer=buf;
    let node=src;
    if(o.lp){ const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=o.lp; node.connect(f); node=f; }
    if(o.hp){ const f=this.ctx.createBiquadFilter(); f.type="highpass"; f.frequency.value=o.hp; node.connect(f); node=f; }
    const g=this.ctx.createGain(); g.gain.value=o.gain||0.08;
    node.connect(g); g.connect(this.master);
    if(o.verb) g.connect(this.wet);
    src.start(t0);
  },
  /* --- game events --- */
  PENTA:[262,294,330,392,440,523,587,659,784,880,1047,1175],
  hover(col){ this.tone(300+col*36, {dur:.04, type:"triangle", gain:.018}); },
  whoosh(){ this.noise({dur:.22, gain:.05, lp:900}); },
  land(row){ // deeper thock when landing lower
    const f = 120 + (ROWS-1-row)*22;
    this.tone(f,{dur:.13,type:"sine",gain:.22}); this.noise({dur:.05,gain:.1,hp:2000});
  },
  word(len, chain){ // ascending pentatonic run; higher register per chain
    const base = Math.min(4+(chain-1)*2, this.PENTA.length-len);
    for(let i=0;i<len;i++){
      this.tone(this.PENTA[Math.min(base+i,this.PENTA.length-1)]*(0.995+Math.random()*0.01),
        {dur:.16, type:"triangle", gain:.11, when:i*0.07, verb:true});
    }
    // sparkle on top
    this.tone(this.PENTA[Math.min(base+len,this.PENTA.length-1)]*2, {dur:.3,type:"sine",gain:.05,when:len*0.07,verb:true});
  },
  riser(chain){ this.tone(180*chain,{dur:.32,type:"sawtooth",gain:.045,slideTo:180*chain*3,verb:true}); },
  collapse(n){ for(let i=0;i<Math.min(n,7);i++) this.noise({dur:.04,gain:.05,hp:900,when:i*0.045}); },
  chainBig(chain){
    [0,4,7,12].forEach((st,i)=>this.tone(262*Math.pow(2,(st+chain*2)/12),{dur:.35,type:"triangle",gain:.12,when:i*0.09,verb:true}));
    this.noise({dur:.5,gain:.06,lp:1200,verb:true});
  },
  bomb(){ this.noise({dur:.09,gain:.09,hp:3000}); this.tone(55,{dur:.5,type:"sine",gain:.3,when:.05}); this.noise({dur:.4,gain:.16,lp:300,when:.05}); },
  gold(){ [1568,2093,2637].forEach((f,i)=>this.tone(f,{dur:.12,type:"square",gain:.04,when:i*0.06,verb:true})); },
  rise(){ this.tone(90,{dur:.4,type:"sawtooth",gain:.07,slideTo:140}); this.noise({dur:.3,gain:.05,lp:400}); },
  levelUp(){ [262,330,392,523,659,784].forEach((f,i)=>this.tone(f,{dur:.28,type:"triangle",gain:.13,when:i*0.09,verb:true})); this.noise({dur:.6,gain:.05,lp:1500,verb:true,when:.3}); },
  laserSnd(){ this.tone(1400,{dur:.3,type:"sawtooth",gain:.1,slideTo:120}); this.noise({dur:.25,gain:.08,hp:2500}); },
  earn(){ this.tone(1047,{dur:.1,type:"square",gain:.05,verb:true}); this.tone(1319,{dur:.16,type:"square",gain:.05,when:.08,verb:true}); },
  danger(){ this.tone(70,{dur:.18,type:"sine",gain:.14}); this.tone(70,{dur:.14,type:"sine",gain:.1,when:.25}); },
  reject(){ this.tone(140,{dur:.18,type:"sawtooth",gain:.09}); },
  over(){ [392,330,262,196].forEach((f,i)=>this.tone(f,{dur:.34,type:"triangle",gain:.12,when:i*0.17,verb:true})); },
  startAmbient(){
    clearInterval(this.ambientTimer);
    this.ambientTimer = setInterval(()=>{
      if(!this.on||!this.ctx||S.over||S.busy) return;
      if(Math.random()<0.65){
        const n=this.PENTA[Math.floor(Math.random()*6)];

      }
    }, 3200);
  },
};
function buzz(p){ try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} }

let S = null;
let P = load();

function save(){ try{ localStorage.setItem("worddrop_v1",JSON.stringify(P)); }catch(e){} }

function TARGET(L){ return 60; } // Levels are celebrations, not difficulty spikes.
function dailyQuest(){
  // A tiny, always-achievable reason to return. It never blocks the run or punishes a miss.
  const day = Math.floor(Date.now()/86400000);
  return [
    {name:"Warm-up", type:"words", target:3, reward:"wild", text:"clear 3 words"},
    {name:"Word Picnic", type:"letters", target:8, reward:"bomb", text:"clear 8 letters"},
    {name:"Little Treasure", type:"points", target:24, reward:"wild", text:"earn 24 points"},
    {name:"Long Way Home", type:"long", target:1, reward:"bomb", text:"make a 4-letter word"},
  ][day % 4];
}
function newState(){
  return { board: Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    tiles:{}, seq:0, score:0, levelScore:0, target:TARGET(1), level:1, riseEvery:RISE_EVERY,
    drops:0, chain:1, maxChain:1, cascadeMax:1,
    deadDrops:0, nudging:false, idleNudges:0, lastAction:Date.now(), clearedThisDrop:false,
    pow:{wild:0,bomb:0,laser:0}, usingPower:null,
    bestWord:"", bestWordPts:0, cur:null, next:null, held:null, over:false, busy:false, hoverCol:3,
    killers:{}, wordsMade:0, lettersCleared:0, nextGift:5,
    quest:dailyQuest(), questProgress:0, questDone:false };
}
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
function drawLetter(){
  // gentle vowel balancing against the current board
  let letters=0, vowels=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ const t=S.board[r][c]; if(t&&t.kind==="normal"){ letters++; if(VOWELS.has(t.letter)) vowels++; } }
  if(letters>4 && vowels/letters<0.25 && Math.random()<0.5) return rand(["a","e","i","o"]);
  return FREQ[Math.floor(Math.random()*FREQ.length)];
}
function makePiece(){
  // bombs & wilds are EARNED now (powerup tray), not dealt; gold stays as scoring spice
  if(Math.random()<0.12) return {letter:riggedLetter(), kind:"gold"};
  return {letter:riggedLetter(), kind:"normal"};
}

function xy(r,c){ return "translate("+(c*STEP)+"px,"+(r*STEP)+"px)"; }

function placeTile(t,r,c,instant){

function newTile(letter,kind,r,c,instant){

function removeTile(t){

/* =================== WORD SCAN =================== */
function cellsToPattern(cells){ return cells.map(t=>t.kind==="wild"?".":t.letter).join(""); }
function matchPattern(pat){
  if(!pat.includes(".")) return COMMON.has(pat) ? pat : null;
  const list = BY_LEN[pat.length]||[], re = new RegExp("^"+pat+"$");
  for(const w of list) if(re.test(w)) return w;
  return null;
}
function scanLine(cellsLine){ // array of tiles/null → [{cells, word}]
  const found=[];
  let seg=[];
  const flush=()=>{
    let pos=0;
    while(pos <= seg.length-MIN_LEN){
      let hit=null;
      for(let L=Math.min(seg.length-pos,8); L>=MIN_LEN; L--){
        const cells=seg.slice(pos,pos+L);
        if(cells.every(t=>t.kind==="wild")) continue;
        const w=matchPattern(cellsToPattern(cells));
        if(w){ hit={cells,word:w}; break; }
      }
      if(hit){ found.push(hit); pos += hit.cells.length; }
      else pos++;
    }
    seg=[];
  };
  cellsLine.forEach(t=>{ if(t && t.kind!=="bomb") seg.push(t); else flush(); });
  flush();
  return found;
}
function scanBoth(line){
  // players build words in any direction (C-O-D stacked bottom-up reads D-O-C top-down) — be generous, scan both ways.
  // reversed hits keep cells in WORD order, so reveals sweep in reading direction.
  return [...scanLine(line), ...scanLine([...line].reverse())];
}
function findWords(){
  const found=[], seen=new Set();
  const push=h=>{
    const key=h.cells.map(t=>t.id).sort().join(",");
    if(seen.has(key)) return;
    seen.add(key); found.push(h);
  };
  for(let r=0;r<ROWS;r++) scanBoth(S.board[r]).forEach(push);
  for(let c=0;c<COLS;c++) scanBoth(S.board.map(row=>row[c])).forEach(push);
  return found;
}
function wouldClear(piece, c){ // would dropping this piece in column c complete a word?
  if(piece.kind==="bomb") return null;
  if(S.board[0][c]) return null;
  let land=ROWS-1; while(land>=0 && S.board[land][c]) land--;
  const fake={ id:"fake", letter:piece.kind==="wild"?"?":piece.letter, kind:piece.kind==="wild"?"wild":"normal", r:land, c };
  S.board[land][c]=fake;
  const words=[...scanBoth(S.board[land]), ...scanBoth(S.board.map(row=>row[c]))];
  S.board[land][c]=null;
  let best=null;
  for(const w of words) if(w.cells.includes(fake) && (!best || w.word.length>best.length)) best=w.word;
  return best;
}
function helpfulByLength(){ // letter → length of the longest word it would complete right now
  const best={};
  for(let c=0;c<COLS;c++){
    if(S.board[0][c]) continue;
    for(const l of "abcdefghijklmnopqrstuvwxyz"){
      const w=wouldClear({letter:l,kind:"normal"},c);
      if(w && w.length>(best[l]||0)) best[l]=w.length;
    }
  }
  return best;
}
// every 2..n-1 length prefix of a 4+ letter common word — used to grow fragments on purpose
const PRE=(()=>{ const s=new Set();
  COMMON.forEach(w=>{ if(w.length>=4) for(let i=2;i<w.length;i++) s.add(w.slice(0,i)); });
  return s; })();
function builderLetters(){ // letters that extend an existing fragment toward a 4+ letter word
  const out=new Set();
  for(let c=0;c<COLS;c++){
    if(S.board[0][c]) continue;
    let land=ROWS-1; while(land>=0&&S.board[land][c]) land--;
    let below=""; // vertical: new letter tops the stack, word reads downward
    for(let r=land+1;r<Math.min(ROWS,land+4);r++){ const t=S.board[r][c]; if(!t||t.kind!=="normal"&&t.kind!=="gold") break; below+=t.letter; }
    let left=""; // horizontal: letter lands to the right of a run at the same height
    for(let cc=c-1;cc>=0&&c-cc<=3;cc--){ const t=S.board[land][cc]; if(!t||t.kind!=="normal"&&t.kind!=="gold") break; left=t.letter+left; }
    for(const l of "abcdefghijklmnopqrstuvwxyz"){
      if(below && PRE.has((l+below).slice(0,4))) out.add(l);
      if(left && PRE.has(left+l)) out.add(l);
    }
  }
  return [...out];
}
function riggedLetter(){ // A gentle deck keeps the game breezy — and steers it toward LONG words.
  if(!S) return drawLetter();
  const best=helpfulByLength();
  const longs=Object.keys(best).filter(l=>best[l]>=4);
  if(longs.length && Math.random()<0.5) return rand(longs);          // finish a 4-5 letter word
  if(Object.keys(best).length && Math.random()<0.35) return rand(Object.keys(best)); // finish any word
  const b=builderLetters();
  if(b.length && Math.random()<0.55) return rand(b);                 // grow a fragment toward a long word
  return drawLetter();
}

/* =================== GAME =================== */
const Game = {
  start(){
    boardEl.innerHTML="";
    S = newState();
    // light prefill: one full bottom row + a few strays, scrubbed of instant words
    for(let c=0;c<COLS;c++) newTile(drawLetter(),"normal",ROWS-1,c);
    for(let i=0;i<4;i++){ const c=Math.floor(Math.random()*COLS); if(!S.board[ROWS-2][c]) newTile(drawLetter(),"normal",ROWS-2,c); }
    let guard=0;
    while(findWords().length && guard++<80){
      const w=findWords()[0]; const t=rand(w.cells);
      t.letter = drawLetter(); t.inner.innerHTML = t.letter.toUpperCase()+"<small>"+VAL[t.letter]+"</small>";
    }
    S.cur = makePiece(); S.next = makePiece();
    $("over").classList.remove("active");
    UI.all();
    saveRun();
  },
  restart(){ Snd.init(); Game.start(); },

  hold(){
    if(!S || S.busy || S.over) return;
    Snd.init();
    S.lastAction=Date.now();
    const h = S.held;
    S.held = S.cur;
    if(h){ S.cur = h; }
    else { S.cur = S.next; S.next = makePiece(); }
    Snd.tone(660,{dur:.07,type:"triangle",gain:.08}); Snd.tone(880,{dur:.07,type:"triangle",gain:.06,when:.06});
    buzz(10);
    UI.piece(); UI.holdSwap(); UI.toast("Saved a letter for later"); UI.hints(); UI.ghost(S.hoverCol);
    saveRun();
  },

  async drop(col){
    if(S.over||S.busy) return;
    Snd.init();
    if(S.board[0][col]){ Snd.reject(); buzz(60); UI.toast("Column full!"); return; }
    S.busy = true;
    UI.ghost(-1);
    // landing row
    let land=ROWS-1; while(land>=0 && S.board[land][col]) land--;
    const power = S.usingPower;
    let piece;
    if(power){ // powerups don't consume your letter or your turn
      piece = { letter: power==="wild"?"★":power==="laser"?"⚡":"💣", kind:power };
      S.pow[power]--; S.usingPower=null; UI.tray();
    } else {
      piece=S.cur; S.cur=S.next; S.next=makePiece();
    }
    // animate the fall
    const t = newTile(piece.letter, piece.kind, land, col, false);
    t.el.style.transition="none"; t.el.style.transform=xy(-1.2,col); void t.el.offsetWidth;
    const fallMs = 80 + land*42;
    t.el.style.transition="transform "+fallMs+"ms cubic-bezier(.55,0,.85,.55)"; // accelerate like gravity
    t.el.style.transform=xy(land,col);
    Snd.whoosh();
    await wait(fallMs);
    t.el.style.transition="";
    t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
    UI.dust(land,col);
    // jostle the stack it landed on
    for(let r=land+1, d=0; r<ROWS; r++, d++){
      const below=S.board[r][col];
      if(below) setTimeout(()=>{ below.inner.classList.add("jostle"); setTimeout(()=>below.inner.classList.remove("jostle"),220); }, 30+d*28);
    }
    Snd.land(land); buzz(12);
    if(piece.kind==="gold") Snd.gold();

    S.cascadeMax=1; S.clearedThisDrop=false; S.lastAction=Date.now();
    if(piece.kind==="bomb"){ await Game.explode(t); }
    else if(piece.kind==="laser"){ await Game.laser(t); }
    S.chain=1;
    await Game.resolve();
    if(S.cascadeMax>=3) Game.earn("laser");

    if(!power){ // powerup drops don't advance the rise clock
      // a struggling player gets one passing nudge after 2 dead drops, then we back off again
      if(S.clearedThisDrop){ S.deadDrops=0; S.idleNudges=0; }
      else { S.deadDrops++; if(S.deadDrops>=2){ S.deadDrops=0; setTimeout(()=>UI.nudge(), 350); } }
      S.drops++;
      if(S.drops % S.riseEvery === 0){ await Game.riseRow(); }
    }
    if(!S.over && S.levelScore>=S.target){ await Game.levelUp(); }
    S.busy=false;
    UI.all();
    Game.checkDanger();
    saveRun();
  },

  async laser(t){
    await wait(120);
    Snd.laserSnd(); buzz([30,60]);
    boardEl.classList.add("flash"); setTimeout(()=>boardEl.classList.remove("flash"),400);
    const row=[...S.board[t.r]].filter(Boolean);
    row.forEach((x,i)=>setTimeout(()=>removeTile(x), i*45));
    S.score += row.length*2; S.levelScore += row.length*2;
    await wait(row.length*45+220);
    await Game.gravity();
  },

  async levelUp(){
    S.level++; S.levelScore=Math.max(0,S.levelScore-S.target);
    S.target=TARGET(S.level);
    // This is a cozy game: levels add celebration, never tighten the timer-like rise rhythm.
    S.riseEvery=RISE_EVERY;
    Snd.levelUp(); buzz([50,50,120]); UI.confetti();
    const b=document.createElement("div"); b.className="lvlbanner"; b.textContent="LEVEL "+S.level+"!";
    document.getElementById("app").appendChild(b); setTimeout(()=>b.remove(),1650);
    await wait(600);
    // reward: vaporize the bottom two rows — breathing room
    for(let r=ROWS-2;r<ROWS;r++) for(let c=0;c<COLS;c++){ const x=S.board[r][c]; if(x) removeTile(x); }
    Snd.collapse(10);
    await wait(340);
    await Game.gravity();
    UI.hud();
  },

  earn(kind){
    if(S.pow[kind]>=3) return;
    S.pow[kind]++;
    const slot=$("ps-"+kind);
    const app=document.getElementById("app");
    const fly=document.createElement("div");
    fly.textContent = kind==="wild"?"★":kind==="bomb"?"💣":"⚡";
    fly.style.cssText="position:absolute;z-index:95;font-size:32px;left:48%;top:38%;transition:all .55s cubic-bezier(.45,0,.7,1);pointer-events:none;text-shadow:0 0 14px var(--gold)";
    app.appendChild(fly);
    const ar=app.getBoundingClientRect(), sr=slot.getBoundingClientRect();
    requestAnimationFrame(()=>{ fly.style.left=(sr.left-ar.left+8)+"px"; fly.style.top=(sr.top-ar.top+4)+"px"; fly.style.fontSize="18px"; });
    setTimeout(()=>{ fly.remove(); slot.classList.add("pop"); setTimeout(()=>slot.classList.remove("pop"),480); UI.tray(); Snd.earn(); buzz(15); }, 560);
  },

  recordWord(word, points){
    S.wordsMade++;
    S.lettersCleared += word.cells.length;
    const q=S.quest;
    if(!S.questDone){
      if(q.type==="words") S.questProgress=S.wordsMade;
      else if(q.type==="letters") S.questProgress=S.lettersCleared;
      else if(q.type==="points") S.questProgress=Math.min(q.target, S.questProgress+points);
      else if(q.type==="long") S.questProgress += word.cells.length>=4 ? 1 : 0;
      if(S.questProgress>=q.target){
        S.questProgress=q.target; S.questDone=true;
        Game.earn(q.reward);
        UI.toast("Little goal complete — a surprise power is yours!");
      }
    }
    if(S.wordsMade>=S.nextGift){
      S.nextGift+=5;
      Game.earn(rand(["wild","bomb","laser"]));
      UI.toast("Pocket surprise unlocked — keep the words coming!");
    }
    UI.cozy();
  },

  usePower(kind){
    if(!S || S.busy || S.over) return;
    Snd.init();
    S.lastAction=Date.now();
    if(S.usingPower===kind){ S.usingPower=null; }
    else{
      if(S.pow[kind]<=0){
        UI.toast("Earn it: "+(kind==="wild"?"play a 4-letter word":kind==="bomb"?"play a 5-letter word":"hit a chain ×3"));
        Snd.reject(); return;
      }
      S.usingPower=kind;
      UI.toast(kind==="laser"?"⚡ Laser armed — clears its whole row!":kind==="bomb"?"💣 Bomb armed — pick a spot!":"★ Wild armed — completes anything!");
    }
    UI.tray(); UI.hints(); UI.ghost(S.hoverCol);
  },

  async explode(bomb){
    await wait(120);
    Snd.bomb(); buzz([40,30,90]);
    $("boardwrap").classList.add("shake"); setTimeout(()=>$("boardwrap").classList.remove("shake"),450);
    const {r,c}=bomb;
    for(let rr=r-1;rr<=r+1;rr++) for(let cc=c-1;cc<=c+1;cc++){
      if(rr<0||rr>=ROWS||cc<0||cc>=COLS) continue;
      const t=S.board[rr][cc]; if(t) removeTile(t);
    }
    S.score += 15; S.levelScore += 15; UI.hud();
    await wait(340);
    await Game.gravity();
  },

  async resolve(){
    const words = findWords();
    if(!words.length) return;
    S.clearedThisDrop = true;
    if(S.chain>=2){
      const cb=document.createElement("div"); cb.className="chainburst";
      cb.textContent="CHAIN ×"+S.chain+"!";
      $("boardwrap").appendChild(cb); setTimeout(()=>cb.remove(),950);
      Snd.chainBig(S.chain); buzz([30,40,30,80]);
      if(S.chain>=3) UI.confetti();
      await wait(400);
    }
    // reveal each word letter by letter — this pause IS the game
    const allCells = new Set();
    let gained=0;
    for(const w of words){
      const len=w.cells.length;
      let pts=0;
      w.cells.forEach(t=>{ let v = t.kind==="wild"?0:VAL[t.letter]; if(t.kind==="gold") v*=3; pts+=v; });
      pts = Math.round(pts * (1+0.5*(len-3)) * S.chain); // long words pay disproportionately
      gained += pts;
      const banner=document.createElement("div"); banner.className="wordbanner";
      banner.style.fontSize = Math.min(18+len*2.5, 34)+"px";
      $("boardwrap").appendChild(banner);
      const base = Math.min(4+(S.chain-1)*2, Snd.PENTA.length-len);
      for(let i=0;i<len;i++){
        const t=w.cells[i];
        t.inner.classList.add("lit"); allCells.add(t);
        banner.textContent = w.word.slice(0,i+1).toUpperCase();
        Snd.tone(Snd.PENTA[Math.min(base+i,Snd.PENTA.length-1)]*(0.995+Math.random()*0.01),
          {dur:.18,type:"triangle",gain:.12,verb:true});
        buzz(8);
        await wait(165);
      }
      banner.textContent = w.word.toUpperCase()+"  +"+pts;
      banner.classList.add("done");
      Snd.tone(Snd.PENTA[Math.min(base+len,Snd.PENTA.length-1)]*2,{dur:.32,type:"sine",gain:.06,verb:true});
      if(pts>S.bestWordPts){ S.bestWordPts=pts; S.bestWord=w.word.toUpperCase(); }
      if(len>=5){ Game.earn("bomb"); UI.confetti(); }
      else if(len>=4) Game.earn("wild");
      Game.recordWord(w, pts);
      await wait(700); // hold — let the word be READ
      banner.classList.add("fade"); setTimeout(()=>banner.remove(),450);
    }
    S.maxChain=Math.max(S.maxChain,S.chain);
    S.cascadeMax=Math.max(S.cascadeMax,S.chain);
    if(S.chain>=2){ boardEl.classList.add("flash"); setTimeout(()=>boardEl.classList.remove("flash"),400); }
    S.score += gained; S.levelScore += gained;
    UI.hud(); UI.chain();
    await wait(150);
    // clear
    allCells.forEach(t=>removeTile(t));
    Snd.collapse(allCells.size);
    await wait(220);
    await Game.gravity();
    // letter rain: new (often helpful) letters tumble in — this is where cascades come from
    await Game.rain(Math.min(2, Math.ceil(allCells.size/3)));
    // anticipation beat before the next scan: will the cascade continue?
    S.chain++;
    Snd.riser(S.chain);
    await wait(430);
    await Game.resolve();
  },

  async rain(count){
    for(let i=0;i<count;i++){
      const open=[];
      for(let c=0;c<COLS;c++){ let land=ROWS-1; while(land>=0&&S.board[land][c])land--; if(land>=2) open.push({c,land}); }
      if(!open.length) return;
      const p=open[Math.floor(Math.random()*open.length)];
      const t=newTile(riggedLetter(),"normal",p.land,p.c,false);
      t.el.style.transition="none"; t.el.style.transform=xy(-1.2,p.c); void t.el.offsetWidth;
      const ms=70+p.land*32;
      t.el.style.transition="transform "+ms+"ms cubic-bezier(.55,0,.85,.55)";
      t.el.style.transform=xy(p.land,p.c);
      Snd.tone(520+Math.random()*260,{dur:.06,type:"triangle",gain:.045});
      await wait(ms);
      t.el.style.transition="";
      t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
      UI.dust(p.land,p.c);
    }
    await wait(160);
  },

  async gravity(){
    let moved=false;
    for(let c=0;c<COLS;c++){
      const stack=[];
      for(let r=ROWS-1;r>=0;r--){ const t=S.board[r][c]; if(t) stack.push(t); S.board[r][c]=null; }
      stack.forEach((t,i)=>{
        const nr=ROWS-1-i;
        const dist = nr - t.r;
        const falling = dist>0;
        if(falling) moved=true;
        S.board[nr][c]=t; t.r=nr; t.c=c;
        // staggered tumble: lower tiles settle first, fall time scales with distance
        setTimeout(()=>{
          if(falling){ t.el.style.transition="transform "+(90+dist*55)+"ms cubic-bezier(.55,0,.85,.6)"; }
          t.el.style.transform=xy(nr,c);
          if(falling) setTimeout(()=>{ t.el.style.transition="";
            t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
          }, 90+dist*55);
        }, i*24);
      });
    }
    if(moved) await wait(340);
  },

  async riseRow(){
    // overflow check
    for(let c=0;c<COLS;c++) if(S.board[0][c]){ return Game.gameOver(); }
    Snd.rise(); buzz(25);
    for(let r=0;r<ROWS-1;r++) for(let c=0;c<COLS;c++){
      S.board[r][c]=S.board[r+1][c];
      if(S.board[r][c]){ S.board[r][c].r=r; placeTile(S.board[r][c],r,c,false); }
    }
    for(let c=0;c<COLS;c++){ S.board[ROWS-1][c]=null; newTile(drawLetter(),"normal",ROWS-1,c,false); }
    UI.hud();
    await wait(280);
    S.chain=1;
    await Game.resolve();
  },

  checkDanger(){
    let danger=false;
    for(let c=0;c<COLS;c++) if(S.board[1][c]) danger=true;
    boardEl.classList.toggle("danger",danger);
    if(danger) Snd.danger();
  },

  gameOver(){
    S.over=true;
    Snd.over(); buzz([80,60,150]);
    if(S.score>P.best){ P.best=S.score; }
    if(S.bestWordPts>0 && S.bestWord) P.bestWord=S.bestWord;
    P.run=null;
    save();
    $("o-score").textContent=S.score;
    $("o-word").textContent=S.bestWord||"—";
    $("o-chain").textContent="×"+S.maxChain;
    $("over").classList.add("active");
  },
};
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* =================== UI =================== */
const UI = {
  dust(r,c){
    for(let i=0;i<4;i++){
      const d=document.createElement("div"); d.className="dust";
      d.style.left=(c*STEP + 6 + Math.random()*(CELL-12))+"px";
      d.style.top=(r*STEP + CELL - 6)+"px";
      d.style.setProperty("--dx",(Math.random()*44-22)+"px");
      d.style.setProperty("--dy",(-6-Math.random()*16)+"px");
      boardEl.appendChild(d); setTimeout(()=>d.remove(),480);
    }
  },
  ghostEl:null,
  ghost(col){
    if(this.ghostEl){ this.ghostEl.remove(); this.ghostEl=null; }
    if(col<0 || S.over || S.busy) return;
    if(S.board[0][col]) return;
    let land=ROWS-1; while(land>=0 && S.board[land][col]) land--;
    const g=document.createElement("div");
    g.className="tile ghost"; g.style.width=CELL+"px"; g.style.height=CELL+"px"; g.style.fontSize="20px";
    const pk=S.usingPower;
    g.textContent = pk==="bomb"?"💣" : pk==="laser"?"⚡" : pk==="wild"?"★"
      : (S.cur.kind==="bomb"?"💣":S.cur.kind==="wild"?"★":S.cur.letter.toUpperCase());
    g.style.transform=xy(land,col);
    boardEl.appendChild(g); this.ghostEl=g;
    if(S.killers[col]) $("hint").innerHTML = "💥 drops here spell <b style='color:var(--gold)'>"+S.killers[col].toUpperCase()+"</b>!";
    else if(Object.keys(S.killers).length===0) $("hint").innerHTML = "Set up fragments — or 📦 HOLD this letter for later";
  },
  tick(el, val){
    const from=parseInt(el.dataset.v||"0",10);
    el.dataset.v=val;
    if(from===val){ el.textContent=val; return; }
    const t0=performance.now(), dur=420;
    (function step(n){
      const p=Math.min(1,(n-t0)/dur);
      el.textContent=Math.round(from+(val-from)*(1-Math.pow(1-p,2)));
      if(p<1) requestAnimationFrame(step);
    })(t0);
  },
  hud(){
    UI.tick($("score-big"), S.score);
    $("h-level").textContent=S.level;
    $("h-best").textContent=Math.max(P.best,S.score);
    const pips = $("risepips");
    pips.innerHTML = Array.from({length:S.riseEvery},(_,i)=>'<div class="pip'+(i < S.drops%S.riseEvery ? " on":"")+'"></div>').join("");
    const pct=Math.min(100, 100*S.levelScore/S.target);
    $("lvlfill").style.width=pct+"%";
    $("lvltext").textContent=S.levelScore+" / "+S.target+" → level "+(S.level+1);
  },
  chain(){ $("chainlabel").textContent = S.chain>=2 ? "🔥 CHAIN ×"+S.chain : ""; if(S.chain<2) setTimeout(()=>{ if(S&&S.chain<2) $("chainlabel").textContent=""; },800); },
  miniTile(t, size, font){
    const el=document.createElement("div");
    el.className="tile "+(t.kind!=="normal"?t.kind:"");
    el.style.position="relative"; el.style.width=size+"px"; el.style.height=(size+2)+"px"; el.style.fontSize=font+"px";
    el.textContent=(t.kind==="bomb"?"💣":t.kind==="wild"?"★":t.letter.toUpperCase());
    return el;
  },
  piece(){
    const w=$("currentwrap"); w.innerHTML="";
    const t=S.cur;
    const el=UI.miniTile(t,56,26);
    if(t.kind==="normal"||t.kind==="gold") el.innerHTML += "<small>"+VAL[t.letter]+"</small>";
    w.appendChild(el);
    const n=$("nextslot"); n.innerHTML="";
    n.appendChild(UI.miniTile(S.next,44,19));
    const h=$("holdslot"); h.innerHTML="";
    if(S.held) h.appendChild(UI.miniTile(S.held,44,19));
    else h.innerHTML='<span class="holdempty">－</span>';
  },
  holdSwap(){
    const h=$("holdwrap");
    h.classList.remove("swap"); void h.offsetWidth; h.classList.add("swap");
    setTimeout(()=>h.classList.remove("swap"),450);
  },
  cozy(){
    const q=S.quest;
    $("quest").innerHTML = S.questDone
      ? "<b>✓ Little goal complete</b> · keep playing for surprises"
      : "<b>This run: "+q.name+"</b> · "+q.text+" ("+Math.min(q.target,S.questProgress)+"/"+q.target+")";
    const left=Math.max(0,S.nextGift-S.wordsMade);
    $("giftmeter").textContent = left ? "🎁 "+left+" word"+(left===1?"":"s")+" to a surprise" : "🎁 Surprise ready";
  },
  nudge(){
    // a small, self-erasing hint: the rings pulse twice, then fade away on their own
    if(!S || S.busy || S.over || S.nudging) return;
    S.nudging=true;
    UI.hints();
    setTimeout(()=>{
      S.nudging=false;
      document.querySelectorAll(".killcell").forEach(e=>{ e.style.opacity=0; setTimeout(()=>e.remove(),520); });
      const ct=document.querySelector("#currentwrap .tile"); if(ct) ct.classList.remove("shimmer");
      S.killers={};
    }, 2400);
  },
  hadKillers:false,
  hints(){
    S.killers={};
    document.querySelectorAll(".killcell").forEach(e=>e.remove());
    const piece = S.usingPower==="wild" ? {letter:"★",kind:"wild"} : S.cur;
    // hints are a passing nudge, never a permanent overlay: they appear only during a nudge window (or with a wild armed)
    const reveal = S.nudging || S.usingPower==="wild";
    const scanning = reveal && !S.over && !S.busy && (!S.usingPower || S.usingPower==="wild");
    if(scanning){
      for(let c=0;c<COLS;c++){
        const w=wouldClear(piece,c);
        if(w){
          S.killers[c]=w;
          // subtle: a soft pulsing ring on just the landing cell
          let land=ROWS-1; while(land>=0 && S.board[land][c]) land--;
          const m=document.createElement("div"); m.className="killcell";
          m.style.width=CELL+"px"; m.style.height=CELL+"px";
          m.style.left=(c*STEP)+"px"; m.style.top=(land*STEP)+"px";
          boardEl.appendChild(m);
        }
      }
    }
    const curTile=document.querySelector("#currentwrap .tile");
    if(curTile) curTile.classList.toggle("shimmer", Object.keys(S.killers).length>0);
    const n=Object.keys(S.killers).length;
    if(n && !UI.hadKillers){ // "there's a shot on the board" cue
      Snd.tone(1319,{dur:.14,type:"sine",gain:.05,verb:true});
      Snd.tone(1760,{dur:.2,type:"sine",gain:.04,when:.09,verb:true});
    }
    UI.hadKillers = n>0;
    $("hint").innerHTML = n
      ? "💥 <b style='color:var(--gold)'>"+(n===1?"1 spot makes a word!":n+" spots make words!")+"</b>"
      : "Build words across or down — 3+ letters clear!";
  },
  tray(){
    ["wild","bomb","laser"].forEach(k=>{
      const el=$("ps-"+k);
      el.querySelector(".cnt").textContent=S.pow[k];
      el.classList.toggle("has", S.pow[k]>0);
      el.classList.toggle("armed", S.usingPower===k);
    });
  },
  shards(r,c,color){
    for(let i=0;i<6;i++){
      const s=document.createElement("div"); s.className="shard";
      s.style.background=color;
      s.style.left=(c*STEP+CELL/2)+"px"; s.style.top=(r*STEP+CELL/2)+"px";
      s.style.setProperty("--dx",(Math.random()*110-55)+"px");
      s.style.setProperty("--dy",(Math.random()*-90-15)+"px");
      boardEl.appendChild(s); setTimeout(()=>s.remove(),580);
    }
  },
  all(){ UI.hud(); UI.piece(); UI.chain(); UI.hints(); UI.tray(); UI.cozy(); },
  toast(m){ const t=$("toast"); t.textContent=m; t.style.opacity=1; clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity=0,1500); },
  confetti(){
    const colors=["#7dd87d","#ffd54f","#4fc3f7","#ff8a5c","#b388ff"];
    for(let i=0;i<24;i++){ const c=document.createElement("div"); c.className="confetti";
      c.style.left=Math.random()*100+"%"; c.style.background=colors[i%colors.length];
      c.style.animationDelay=(Math.random()*0.3)+"s";
      document.getElementById("app").appendChild(c); setTimeout(()=>c.remove(),1900); }
  },
};

/* =================== INPUT =================== */
function colFromEvent(e){
  const r=boardEl.getBoundingClientRect();
  const x=e.clientX-r.left;
  if(x<0||x>r.width) return -1;
  return Math.max(0,Math.min(COLS-1,Math.floor(x/STEP)));
}
boardEl.addEventListener("pointermove", e=>{
  const c=colFromEvent(e);
  if(c>=0 && c!==S.hoverCol){ Snd.hover(c); }
  S.hoverCol=c; UI.ghost(c);
});
boardEl.addEventListener("pointerleave", ()=>UI.ghost(-1));
boardEl.addEventListener("pointerdown", e=>{ const c=colFromEvent(e); S.hoverCol=c; UI.ghost(c); });
boardEl.addEventListener("pointerup", e=>{
  const c=colFromEvent(e);
  if(c>=0) Game.drop(c);
});
document.addEventListener("pointerdown", ()=>Snd.init(), {once:true});

/* stuck detection: after ~8s of inaction, give a passing nudge (max 2 per thinking pause) */
setInterval(()=>{
  if(!S || S.over || S.busy || S.nudging || S.idleNudges>=2) return;
  if(Date.now()-S.lastAction > 8000){
    S.idleNudges++;
    S.lastAction = Date.now();
    UI.nudge();
    if(S.idleNudges===1) UI.toast("Psst… have a look around 👀");
  }
}, 1000);

/* boot */
if(!loadRun()) Game.start();
window.S = ()=>S; window.Game=Game; window.UI=UI; window.Snd=Snd;
</script>
