<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fdf8ee">
<title>Wordgrove</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect x="4" y="4" width="56" height="56" rx="12" fill="%23f7ecd6" stroke="%23b3a685" stroke-width="3" transform="rotate(-4 32 32)"/><text x="32" y="44" font-family="Segoe UI,sans-serif" font-size="34" font-weight="800" fill="%234a3b28" text-anchor="middle">W</text></svg>'>
<style>
  /* ================= DESIGN TOKENS — one system, everything derives from here ================= */
  :root{
    /* ===== "MORNING MEADOW" — warm daylight cozy. no sad dark. ===== */
    --bg0:#cdbfa5;            /* linen table behind the phone */
    --bg1:#fdf8ee;            /* app: morning cream */
    --bg2:#f6e9d2;            /* app: warm sand */
    --surface:rgba(121,92,55,.07);
    --surface-border:rgba(121,92,55,.15);
    --ink:#4a3b28; --dim:#a28c6d;
    --accent:#68b168; --accent-deep:#4d914d;
    --gold:#f0a92e; --gold-deep:#c98a10;
    --danger:#e2654f;
    --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:26px;
    --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:24px;
    --fs-num:34px; --fs-big:22px; --fs-md:15px; --fs-sm:12px; --fs-xs:10px;
    --shadow-panel:0 10px 26px -12px rgba(121,92,55,.4);
    --tile-face:linear-gradient(148deg,#fffdf4 0%, #f7ecd6 55%, #eadbba 100%);
    --tile-edge:#b3a685;
    --tile-ink:#4a3b28;
    --board-bg:#f3ead4;
    --board-dot:rgba(121,92,55,.22);
    --grass:#7fbf6e;
    --board-tint:linear-gradient(180deg, rgba(255,232,140,.20), rgba(150,200,120,.12));
    --frame1:#c9a06a; --frame2:#a97e4a;
  }
  /* ===== BIOMES: the world changes every 5 levels — the whole plot takes on the place.
     letter tiles keep readable; special tiles keep their identity. ===== */
  #app.bio1{ /* 🌊 lily pond */
    --tile-face:linear-gradient(148deg,#f4fcf8 0%, #ddf0e6 55%, #c2ddcd 100%);
    --tile-edge:#84ab97; --tile-ink:#2e4b3c;
    --board-bg:#dbeee6; --board-dot:rgba(70,120,100,.26); --grass:#6fbf9e;
    --board-tint:linear-gradient(180deg, rgba(150,215,235,.22), rgba(90,175,150,.14));
    --frame1:#8fc3ae; --frame2:#5e9e86; }
  #app.bio2{ /* 🍂 autumn wood */
    --tile-face:linear-gradient(148deg,#fff6e6 0%, #fbe3bd 55%, #eec584 100%);
    --tile-edge:#bd8a48; --tile-ink:#5c3d17;
    --board-bg:#f3e0c2; --board-dot:rgba(160,100,40,.24); --grass:#d09a4a;
    --board-tint:linear-gradient(180deg, rgba(245,190,110,.24), rgba(200,130,60,.14));
    --frame1:#c99a55; --frame2:#9c6f33; }
  #app.bio3{ /* 🌙 moonlit glade */
    --tile-face:linear-gradient(148deg,#f9f5fd 0%, #e9def4 55%, #d2c2e4 100%);
    --tile-edge:#9c86b8; --tile-ink:#463359;
    --board-bg:#e4dcf0; --board-dot:rgba(110,85,150,.24); --grass:#9f88c0;
    --board-tint:linear-gradient(180deg, rgba(180,150,220,.22), rgba(110,85,150,.16));
    --frame1:#a893c8; --frame2:#7d63b8; }
  #app.bio4{ /* ❄ winter grove */
    --tile-face:linear-gradient(148deg,#fbfdff 0%, #e8f2fa 55%, #d2e2ef 100%);
    --tile-edge:#8fa9c0; --tile-ink:#2f4459;
    --board-bg:#e2edf5; --board-dot:rgba(90,130,170,.24); --grass:#a9c4d8;
    --board-tint:linear-gradient(180deg, rgba(200,225,240,.26), rgba(120,160,195,.14));
    --frame1:#a9c0d4; --frame2:#7d9bb4; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:var(--ink);
    background:var(--bg0);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }

  /* ============ THE PHONE STAGE: a fixed 396×800 logical screen, scaled to fit ============
     The layout is designed exactly once at this size. Any viewport — phone, pane, desktop —
     sees the whole stage uniformly scaled. Rows can never crush, clip, or rearrange. */
  #app{
    position:absolute; left:50%; top:50%; overflow:hidden;
    transform:translate(-50%,-50%);
    width:396px; height:800px;
    background:linear-gradient(172deg,var(--bg1),var(--bg2));
    display:flex; flex-direction:column;
    border-radius:34px; border:1px solid rgba(121,92,55,.25);
    box-shadow:0 30px 70px -26px rgba(90,60,30,.6), 0 0 0 8px #4a3b28;
    transform-origin:center center;
  }
  #app::before{ content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(340px 260px at 14% 4%, rgba(140,205,235,.22), transparent 62%),
      radial-gradient(420px 320px at 88% 96%, rgba(150,200,130,.18), transparent 62%),
      radial-gradient(300px 260px at 86% 10%, rgba(250,190,110,.20), transparent 62%); }
  #app::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(130% 100% at 50% 40%, transparent 60%, rgba(121,80,40,.12)); }

  /* ================= SHARED COMPONENTS ================= */
  button{ font-family:inherit; border:none; cursor:pointer; color:var(--ink); background:none; padding:0; }
  .panel{ background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--r-lg); }
  .chip{ display:inline-flex; align-items:center; gap:6px; background:var(--surface);
    border:1px solid var(--surface-border); border-radius:999px; padding:6px 13px;
    font-size:var(--fs-sm); color:var(--dim); }
  .chip b{ color:var(--ink); font-size:14px; font-variant-numeric:tabular-nums; }
  .btn-primary{ display:flex; align-items:center; justify-content:center; gap:8px;
    background:linear-gradient(150deg,var(--accent),var(--accent-deep)); color:#0c1e0c;
    border-radius:var(--r-md); font-size:17px; font-weight:800; padding:15px 22px; width:100%;
    box-shadow:0 5px 0 rgba(0,0,0,.35); }
  .btn-primary:active{ transform:translateY(2px); box-shadow:0 3px 0 rgba(0,0,0,.35); }
  .btn-gold{ background:linear-gradient(150deg,var(--gold),var(--gold-deep)); color:#3a2a00; }
  .btn-ghost{ background:var(--surface); border:1px solid var(--surface-border); color:var(--ink); }
  .iconbtn{ width:44px; height:44px; border-radius:50%; font-size:18px; flex:none;
    display:flex; align-items:center; justify-content:center; position:relative;
    background:var(--surface); border:1px solid var(--surface-border); text-decoration:none; color:var(--ink); }
  .iconbtn:active{ transform:scale(.92); }
  .iconbtn .cnt{ position:absolute; bottom:-3px; right:-3px; background:var(--accent); color:#0e2210;
    font-size:10px; font-weight:800; min-width:17px; height:17px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 3px; }
  .armed-danger{ background:rgba(226,101,79,.25)!important; border-color:var(--danger)!important; color:var(--danger)!important; animation:dangerarm 1.1s infinite; }
  @keyframes dangerarm{ 50%{ box-shadow:0 0 12px rgba(255,107,107,.6); transform:scale(1.08); } }

  .scene{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
    padding:calc(14px + env(safe-area-inset-top)) 14px calc(12px + env(safe-area-inset-bottom)); z-index:1; }
  .scene.active{ display:flex; animation:scenein .35s; }
  @keyframes scenein{ from{ opacity:0; transform:translateY(12px) } }

  .overlay{ position:absolute; inset:0; z-index:100; display:none; flex-direction:column;
    align-items:center; justify-content:center; padding:26px;
    background:rgba(96,72,46,.42); backdrop-filter:blur(3px); }
  .overlay.active{ display:flex; animation:scenein .3s; }
  .card{ width:100%; max-width:300px; background:#fffdf6; border:1px solid var(--surface-border);
    border-radius:var(--r-xl); padding:var(--sp5); text-align:center;
    box-shadow:0 20px 44px -14px rgba(90,60,30,.5); display:flex; flex-direction:column; gap:var(--sp3); }
  .card h2{ margin:0; font-size:26px; }
  .card .rowstat{ display:flex; justify-content:space-around; }
  .card .rowstat div{ font-size:var(--fs-sm); color:var(--dim); }
  .card .rowstat b{ display:block; font-size:22px; color:var(--gold-deep); font-variant-numeric:tabular-nums; }

  #toast{ position:absolute; left:50%; bottom:96px; transform:translateX(-50%); background:rgba(74,59,40,.93); color:#fff8ec;
    padding:9px 16px; border-radius:999px; font-size:13px; opacity:0; transition:opacity .3s;
    z-index:300; pointer-events:none; white-space:nowrap; }

  /* ================= HOME — a garden gate ================= */
  #scene-home{ justify-content:flex-start; gap:0; overflow:hidden; padding:0; }
  #sky{ position:absolute; inset:0 0 38% 0; z-index:0;
    background:linear-gradient(180deg,#bfe6f5 0%, #d9f0f7 45%, #eaf6ee 100%); }
  #sun{ position:absolute; top:12%; right:18%; width:76px; height:76px; border-radius:50%;
    background:radial-gradient(circle,#fff3c4 0%,#ffe58a 55%,#ffd35e 100%);
    box-shadow:0 0 44px 14px rgba(255,221,120,.6); animation:sunpulse 5s ease-in-out infinite; }
  @keyframes sunpulse{ 50%{ box-shadow:0 0 60px 22px rgba(255,221,120,.75); } }
  .cloud{ position:absolute; width:120px; height:34px; border-radius:30px; background:rgba(255,255,255,.85);
    filter:blur(1px); animation:drift 26s linear infinite; }
  .cloud::before{ content:""; position:absolute; top:-16px; left:26px; width:56px; height:56px; border-radius:50%; background:inherit; }
  .cloud::after{ content:""; position:absolute; top:-10px; right:22px; width:40px; height:40px; border-radius:50%; background:inherit; }
  @keyframes drift{ to{ transform:translateX(560px); } }
  #hill-far{ position:absolute; left:-5%; right:-5%; bottom:30%; height:26%; z-index:0;
    background:radial-gradient(120% 100% at 50% 100%, #9fd08a 0%, #8cc47a 70%, transparent 71%); opacity:.85; }
  #hill-near{ position:absolute; left:0; right:0; bottom:0; height:40%; z-index:1;
    background:linear-gradient(180deg,#7fbf6e 0%, #6aad5c 55%, #5c9c50 100%);
    border-radius:60% 60% 0 0 / 22% 22% 0 0; box-shadow:0 -6px 20px rgba(60,110,45,.25); }
  #hill-near .sprout{ position:absolute; top:8px; font-size:26px; animation:sway 4s ease-in-out infinite; transform-origin:bottom center; }
  #hill-near .sprout:nth-child(even){ animation-delay:-2s; }
  @keyframes sway{ 0%,100%{ transform:rotate(-6deg) } 50%{ transform:rotate(6deg) } }
  #hill-near .peek{ position:absolute; top:-16px; font-size:30px; transform-origin:bottom center;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.25)); }
  #hill-near .peek:nth-of-type(1){ animation:hop 2.8s ease-in-out infinite; }
  #hill-near .peek:nth-of-type(2){ animation:wiggle 3.4s ease-in-out infinite .6s; }
  @keyframes hop{ 0%,58%,100%{ transform:translateY(0) rotate(0) } 66%{ transform:translateY(-16px) rotate(-8deg) }
    74%{ transform:translateY(0) rotate(0) } 82%{ transform:translateY(-9px) } 90%{ transform:translateY(0) } }
  @keyframes wiggle{ 0%,60%,100%{ transform:rotate(0) } 68%{ transform:rotate(-14deg) } 76%{ transform:rotate(12deg) }
    84%{ transform:rotate(-8deg) } 92%{ transform:rotate(0) } }
  @keyframes peekbob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-6px) } }
  #home-content{ position:relative; z-index:2; width:100%; flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:calc(46px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom)); }
  #homelogo{ text-align:center; }
  .home-pills{ margin-top:-4px; }
  .home-links{ background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.7);
    border-radius:999px; padding:8px 12px; box-shadow:0 6px 16px rgba(60,110,45,.25); backdrop-filter:blur(2px); }
  .home-links .iconbtn{ width:50px; height:50px; font-size:22px; background:#fff; border:1px solid rgba(121,92,55,.14);
    box-shadow:0 3px 8px rgba(60,110,45,.2); }
  .logo-tiles{ display:flex; gap:8px; justify-content:center; }
  .logo-tiles .tile{ width:54px; height:58px; font-size:27px; position:relative; animation:logobob 2.6s ease-in-out infinite; }
  .logo-tiles .tile:nth-child(2){ animation-delay:.18s } .logo-tiles .tile:nth-child(3){ animation-delay:.36s }
  .logo-tiles .tile:nth-child(4){ animation-delay:.54s }
  @keyframes logobob{ 0%,100%{ transform:translateY(0) rotate(-1deg) } 50%{ transform:translateY(-8px) rotate(1.5deg) } }
  .logo-word{ margin-top:12px; font-size:38px; font-weight:900; letter-spacing:9px; padding-left:9px;
    color:var(--accent-deep); text-shadow:0 3px 0 rgba(255,255,255,.7), 0 6px 16px rgba(77,145,77,.3); }
  .logo-sub{ margin-top:4px; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); font-weight:700; }
  #btn-play{ width:96px; height:96px; border-radius:50%; font-size:24px; font-weight:900;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0;
    background:linear-gradient(150deg,var(--accent),var(--accent-deep)); color:#fff;
    box-shadow:0 8px 0 rgba(61,102,61,.55), 0 0 34px rgba(104,177,104,.35); animation:playpulse 1.9s infinite; z-index:1; }
  #btn-play small{ font-size:11px; font-weight:800; opacity:.85; letter-spacing:1px; }
  @keyframes playpulse{ 50%{ box-shadow:0 8px 0 rgba(61,102,61,.55), 0 0 52px rgba(104,177,104,.6); transform:scale(1.04); } }
  #btn-play:active{ transform:scale(.92); }
  .home-pills{ display:flex; gap:8px; z-index:1; }
  .home-links{ display:flex; gap:14px; z-index:1; }

  /* -------- first-run tutorial: four wordless-leaning slides -------- */
  #tut-slide{ min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
  #tut-slide .big{ font-size:38px; letter-spacing:6px; }
  #tut-slide .demo{ display:flex; gap:5px; }
  #tut-slide .demo .tile{ position:relative; width:40px; height:42px; font-size:19px; }
  #tut-slide p{ margin:0; font-size:15px; color:var(--ink); font-weight:600; line-height:1.5; }
  #tut-slide small{ color:var(--dim); font-size:12px; }
  #tut-dots{ display:flex; gap:7px; justify-content:center; }
  #tut-dots i{ width:8px; height:8px; border-radius:50%; background:rgba(121,92,55,.25); }
  #tut-dots i.on{ background:var(--gold-deep); }
  #ov-tut{ background:none; }
  #tut-sky{ position:absolute; inset:0 0 32% 0; background:linear-gradient(180deg,#bfe6f5,#eaf6ee); }
  #tut-sun{ position:absolute; top:9%; right:16%; width:64px; height:64px; border-radius:50%;
    background:radial-gradient(circle,#fff3c4,#ffd35e); box-shadow:0 0 40px 12px rgba(255,221,120,.6); }
  #tut-hill{ position:absolute; left:0; right:0; bottom:0; height:36%;
    background:linear-gradient(180deg,#7fbf6e,#5c9c50); border-radius:60% 60% 0 0 / 22% 22% 0 0; }
  #tut-hill .sprout{ position:absolute; top:12px; font-size:26px; }
  #ov-tut .card{ position:relative; z-index:2; }

  /* ================= GAME SCENE ================= */
  #scene-game{ padding-top:calc(10px + env(safe-area-inset-top)); gap:var(--sp2); }
  #topbar{ width:100%; display:flex; align-items:center; gap:var(--sp2); z-index:2; }
  #lvlchip{ font-weight:800; font-size:var(--fs-sm); letter-spacing:1px; color:var(--dim); }
  #lvlchip b{ color:var(--ink); font-size:15px; }
  #movesbox{ flex:1; text-align:center; }
  #movesbig{ font-size:var(--fs-num); font-weight:900; line-height:1; color:var(--ink);
    font-variant-numeric:tabular-nums; text-shadow:0 2px 0 rgba(255,255,255,.6); transition:color .3s; }
  #movesbig.low{ color:var(--danger); animation:movespulse 1s infinite; }
  @keyframes movespulse{ 50%{ transform:scale(1.12); } }
  #moveslabel{ font-size:var(--fs-xs); letter-spacing:2px; color:var(--dim); text-transform:uppercase; }

  #goalbar{ width:100%; height:26px; border-radius:999px; background:rgba(121,92,55,.13);
    border:1px solid var(--surface-border); position:relative; overflow:hidden; z-index:2;
    box-shadow:inset 0 2px 4px rgba(121,92,55,.2); }
  #goalfill{ height:100%; width:0%; border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--gold));
    transition:width .5s cubic-bezier(.2,.8,.3,1.15); background-size:200% 100%; animation:flow 3s linear infinite; }
  @keyframes flow{ to{ background-position:-200% 0 } }
  #goaltext{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink);
    text-shadow:0 1px 0 rgba(255,255,255,.7); }
  #goalbar .star{ position:absolute; right:5px; top:50%; transform:translateY(-50%); font-size:15px;
    filter:grayscale(1) opacity(.5); transition:filter .3s, transform .3s; }
  #goalbar.done .star{ filter:none; transform:translateY(-50%) scale(1.25); }

  #cozyrow{ display:flex; gap:var(--sp2); z-index:2; }
  .pill{ font-size:var(--fs-sm); color:var(--dim); background:var(--surface); border:1px solid var(--surface-border);
    border-radius:999px; padding:6px 13px; white-space:nowrap; letter-spacing:1px; display:inline-flex; align-items:center; gap:5px; }
  .pill b{ color:var(--ink); }
  .pill.pop{ animation:slotpop .45s; border-color:rgba(255,213,79,.6); }
  .pill.done{ color:var(--accent); }

  #boardwrap{ position:relative; flex:1; min-height:0; width:100%;
    display:flex; align-items:center; justify-content:center; z-index:1; }
  #board{ position:relative;
    background-color:var(--board-bg);
    background-image:
      radial-gradient(7px 11px at 7px -1px, var(--grass) 0 6.5px, transparent 7.5px),  /* grass blades along the top */
      radial-gradient(circle, var(--board-dot) 2px, transparent 2.7px),                /* planting holes */
      var(--board-tint);                                                               /* the place's light */
    background-repeat:repeat-x, repeat, no-repeat;
    background-position:0 0, -2px 12px, center;
    background-size:14px 12px, 48px 48px, cover;
    border-radius:6px var(--r-md) var(--r-md) var(--r-md); overflow:hidden;
    transition:background-color .6s;
    box-shadow:
      0 0 0 6px var(--frame1), 0 0 0 8px var(--frame2),
      0 22px 44px -18px rgba(90,60,30,.55), inset 0 -30px 40px -20px rgba(120,85,45,.3),
      inset 0 16px 12px -8px color-mix(in srgb, var(--grass) 55%, transparent); }
  #board.danger{ animation:dangerpulse 1s infinite; }
  @keyframes dangerpulse{ 50%{ box-shadow:0 0 0 6px #e2654f, 0 0 0 8px #b84a38,
    0 22px 44px -18px rgba(90,60,30,.55); } }

  /* -------- dock: the hand -------- */
  #dock{ width:100%; display:flex; align-items:flex-end; justify-content:center; gap:10px;
    background:var(--surface); border:1px solid var(--surface-border);
    border-radius:var(--r-xl); padding:10px 14px 12px; z-index:2; box-shadow:var(--shadow-panel); }
  .slotlabel{ display:block; text-align:center; font-size:9px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
  #currentwrap{ animation:curbob 2.4s ease-in-out infinite; }
  @keyframes curbob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-5px) } }
  #currentwrap .tile{ box-shadow:0 6px 0 var(--tile-edge), 0 14px 22px -6px rgba(0,0,0,.55),
    inset 0 1.5px 0 rgba(255,255,255,.85), inset 0 -3px 4px rgba(150,128,86,.28); }
  #nextwrap{ text-align:center; }
  #nextwrap .tile{ opacity:.72; }

  /* -------- power bar: powerups are blocks, so they look and size like blocks -------- */
  #powerbar{ width:100%; display:flex; align-items:center; justify-content:center; gap:12px;
    padding:2px 0 4px; z-index:2; }
  .pslot{ width:44px; height:46px; border-radius:9px; background:rgba(121,92,55,.09);
    border:1.5px dashed rgba(121,92,55,.35); display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:800; position:relative; cursor:pointer; opacity:.55;
    transition:transform .15s, box-shadow .15s; }
  .pslot .req{ position:absolute; bottom:2px; left:0; right:0; text-align:center; font-size:8px;
    font-weight:800; color:var(--dim); letter-spacing:.5px; }
  .pslot.has .req{ display:none; }
  .pslot.locked{ opacity:.4; cursor:default; filter:grayscale(.6); }
  .pslot.locked .ic{ opacity:.5; }
  .pslot.locked .req{ color:var(--gold-deep); }
  .pslot.has{ opacity:1; border:none;
    background:var(--tile-face); color:var(--tile-ink); text-shadow:0 1px 0 rgba(255,255,255,.55);
    box-shadow:0 4px 0 var(--tile-edge), 0 5px 7px rgba(0,0,0,.3),
      inset 0 1.5px 0 rgba(255,255,255,.85), inset 0 -3px 4px rgba(150,128,86,.28); }
  #ps-swap.has{ background:linear-gradient(148deg,#e3f7ee,#c2ebd6 55%,#9fd9bd);
    box-shadow:0 4px 0 #6aa98a, 0 5px 7px rgba(0,0,0,.25), inset 0 1.5px 0 rgba(255,255,255,.9), inset 0 -3px 4px rgba(70,140,100,.3); }

<script>

/* Level design is a RHYTHM, not a ramp: gentle → breather → build → breather → 🔥SPIKE.
   Every 10th level is a 👑 golden milestone. Targets grow sub-linearly so the wall never comes. */
const RHYTHM=[1.0, 0.88, 1.02, 0.92, 1.16];
const BIOMES=["🌼","🌊","🍂","🌙","❄️"]; // the world changes every 5 levels
const BIOME_NAMES=["Sunny Meadow","Lily Pond","Autumn Wood","Moonlit Glade","Winter Grove"];
function biomeOf(L){ return Math.floor((L-1)/5)%5; }
function applyBiome(L){

  app.className = app.className.replace(/\bbio\d\b/g,"").trim();
  const b=biomeOf(L);
  if(b>0) app.classList.add("bio"+b);
}
function isSpike(L){ return L%5===0; }
function isMilestone(L){ return L%10===0; }
// The first eight levels are hand-tuned — this is the funnel that decides if anyone
// stays. L1 is nearly unloseable; each new power gets an easy level to play with.
const EARLY=[ null,
  [15,18],  // L1 · no powers · gentle
  [20,18],  // L2 · 🔀 shuffle unlocks
  [26,17],  // L3 · ★ wild unlocks
  [30,17],  // L4 · breather
  [36,16],  // L5 · 💣 blossom unlocks
  [38,17],  // L6 · breather
  [44,16],  // L7 · 🔮 vision unlocks
  [50,16],  // L8
];
function TARGET(L){
  if(EARLY[L]) return EARLY[L][0];
  const base = 46 + 16*Math.pow(L-8, 0.86);
  return Math.round(base*RHYTHM[(L-1)%5]/5)*5;
}
function MOVES(L){
  if(EARLY[L]) return EARLY[L][1];
  return Math.min(20, 16+Math.floor((L-8)/6)) - (isSpike(L)?1:0);
}
function recipe(L){ // each level opens with a different board problem
  return {
    stone: L>=3 ? Math.min(3, 1+Math.floor((L-3)/3)) : 0,
    ice:   L>=5 ? Math.min(3, 1+Math.floor((L-5)/4)) : 0,
    crate: (L>=4 && L%3===1) ? 1 : 0,
  };
}

/* =================== SOUND =================== */
const Snd = {
  ctx:null, master:null, wet:null, on:true, ambientTimer:null, musicTimer:null,
  init(){
    if(this.ctx) { if(this.ctx.state==="suspended") this.ctx.resume(); return; }
    const C = window.AudioContext||window.webkitAudioContext; if(!C) { this.on=false; return; }
    this.ctx = new C();
    const comp = this.ctx.createDynamicsCompressor();
    comp.threshold.value=-18; comp.ratio.value=6;
    this.master = this.ctx.createGain(); this.master.gain.value=0.9;
    this.master.connect(comp); comp.connect(this.ctx.destination);
    const len = this.ctx.sampleRate*1.8, ir = this.ctx.createBuffer(2,len,this.ctx.sampleRate);
    for(let ch=0;ch<2;ch++){ const d=ir.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6); }
    const conv = this.ctx.createConvolver(); conv.buffer=ir;
    this.wet = this.ctx.createGain(); this.wet.gain.value=0.32;
    this.wet.connect(conv); conv.connect(this.master);
    this.startAmbient();
  },
  toggle(){ this.on=!this.on; P.sound=this.on; save();
    document.querySelectorAll(".soundbtn").forEach(el=>el.textContent = this.on?"🔊":"🔇");
    if(this.on){ this.init(); this.startMusic(); }
    else { clearInterval(this.musicTimer); clearInterval(this.ambientTimer); } },
  now(){ return this.ctx.currentTime; },
  tone(freq, o){
    if(!this.on||!this.ctx) return; o=o||{};
    const t0=this.now()+(o.when||0), dur=o.dur||0.15;
    const osc=this.ctx.createOscillator(), g=this.ctx.createGain();
    osc.type=o.type||"sine"; osc.frequency.setValueAtTime(freq,t0);
    if(o.slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(o.slideTo,1),t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(o.gain||0.1, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(this.master);
    if(o.verb) g.connect(this.wet);
    osc.start(t0); osc.stop(t0+dur+0.05);
  },
  noise(o){
    if(!this.on||!this.ctx) return; o=o||{};
    const t0=this.now()+(o.when||0), dur=o.dur||0.15;
    const len=Math.max(1,this.ctx.sampleRate*dur), buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=this.ctx.createBufferSource(); src.buffer=buf;
    let node=src;
    if(o.lp){ const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=o.lp; node.connect(f); node=f; }
    if(o.hp){ const f=this.ctx.createBiquadFilter(); f.type="highpass"; f.frequency.value=o.hp; node.connect(f); node=f; }
    const g=this.ctx.createGain(); g.gain.value=o.gain||0.08;
    node.connect(g); g.connect(this.master);
    if(o.verb) g.connect(this.wet);
    src.start(t0);
  },
  PENTA:[262,294,330,392,440,523,587,659,784,880,1047,1175],
  hover(col){ this.tone(300+col*36, {dur:.04, type:"triangle", gain:.018}); },
  whoosh(){ this.noise({dur:.22, gain:.05, lp:900}); },
  land(row){ const f = 120 + (ROWS-1-row)*22;
    this.tone(f,{dur:.13,type:"sine",gain:.22}); this.noise({dur:.05,gain:.1,hp:2000}); },
  riser(chain){ this.tone(180*chain,{dur:.32,type:"sawtooth",gain:.045,slideTo:180*chain*3,verb:true}); },
  collapse(n){ for(let i=0;i<Math.min(n,7);i++) this.noise({dur:.04,gain:.05,hp:900,when:i*0.045}); },
  chainBig(chain){
    [0,4,7,12].forEach((st,i)=>this.tone(262*Math.pow(2,(st+chain*2)/12),{dur:.35,type:"triangle",gain:.12,when:i*0.09,verb:true}));
    this.noise({dur:.5,gain:.06,lp:1200,verb:true}); },
  bomb(){ this.noise({dur:.09,gain:.09,hp:3000}); this.tone(55,{dur:.5,type:"sine",gain:.3,when:.05}); this.noise({dur:.4,gain:.16,lp:300,when:.05}); },
  gold(){ [1568,2093,2637].forEach((f,i)=>this.tone(f,{dur:.12,type:"square",gain:.04,when:i*0.06,verb:true})); },
  crack(shatter){ this.noise({dur:.08,gain:.12,hp:600});
    if(shatter){ this.noise({dur:.25,gain:.1,lp:900,when:.05}); this.tone(160,{dur:.2,type:"triangle",gain:.1,when:.03}); } },
  thaw(){ this.tone(1200,{dur:.18,type:"sine",gain:.07,slideTo:1800,verb:true}); this.noise({dur:.12,gain:.05,hp:3000}); },
  levelUp(){ [262,330,392,523,659,784].forEach((f,i)=>this.tone(f,{dur:.28,type:"triangle",gain:.13,when:i*0.09,verb:true})); this.noise({dur:.6,gain:.05,lp:1500,verb:true,when:.3}); },
  fail(){ [392,330,262,196].forEach((f,i)=>this.tone(f,{dur:.34,type:"triangle",gain:.12,when:i*0.17,verb:true})); },
  earn(){ this.tone(1047,{dur:.1,type:"square",gain:.05,verb:true}); this.tone(1319,{dur:.16,type:"square",gain:.05,when:.08,verb:true}); },
  discover(){ [523,659,784,1047,1319,1568].forEach((f,i)=>this.tone(f,{dur:.4,type:"sine",gain:.09,when:i*0.09,verb:true}));
    this.tone(2093,{dur:.8,type:"sine",gain:.04,when:.55,verb:true}); },
  danger(){ this.tone(70,{dur:.18,type:"sine",gain:.14}); this.tone(70,{dur:.14,type:"sine",gain:.1,when:.25}); },
  reject(){ this.tone(140,{dur:.18,type:"sawtooth",gain:.09}); },
  startAmbient(){
    clearInterval(this.ambientTimer);
    this.ambientTimer = setInterval(()=>{
      if(!this.on||!this.ctx||!S||S.over||S.busy) return;
      if(Math.random()<0.5){
        const n=this.PENTA[Math.floor(Math.random()*6)];
        this.tone(n/2,{dur:1.4,type:"sine",gain:.012,verb:true});
      }
    }, 3600);
    this.startMusic();
  },
  // a slow, cozy lofi-ish chord bed — soft warm pads through the reverb, one chord every 4.4s
  CHORDS:[ [130.8,164.8,196.0], [146.8,174.6,220.0], [110.0,164.8,220.0], [123.5,146.8,196.0] ], // C · Dm-ish · Am · G, low & mellow
  _chord:0,
  startMusic(){
    clearInterval(this.musicTimer);
    const play=()=>{
      if(!this.on||!this.ctx) return;
      const ch=this.CHORDS[this._chord%this.CHORDS.length]; this._chord++;
      ch.forEach((f,i)=>{
        // soft triangle pad, slow attack, long release, gentle detune for warmth
        const c=this.ctx, t0=c.currentTime;
        const o=c.createOscillator(), g=c.createGain(), lp=c.createBiquadFilter();
        o.type="triangle"; o.frequency.value=f*(1+(Math.random()*0.006-0.003));
        lp.type="lowpass"; lp.frequency.value=900;
        g.gain.setValueAtTime(0.0001,t0);
        g.gain.exponentialRampToValueAtTime(0.02,t0+0.9);      // slow swell
        g.gain.exponentialRampToValueAtTime(0.0001,t0+4.2);    // long fade
        o.connect(lp); lp.connect(g); g.connect(this.master); g.connect(this.wet);
        o.start(t0); o.stop(t0+4.4);
      });
      // a soft high sparkle note occasionally, like birdsong
      if(Math.random()<0.5) this.tone(this.PENTA[6+Math.floor(Math.random()*4)],{dur:.5,type:"sine",gain:.02,when:1+Math.random(),verb:true});
    };
    play();
    this.musicTimer=setInterval(play, 4400);
  },
};

let S = null;
function load(){
  const defaults = {level:1, sound:true, streak:0, lastDay:0, dailyWordDay:-1, grove:{}, bestWord:"",
    pow:{wild:0,bomb:0,oracle:0,transmute:0,swap:0}, seenUnlock:{},

    questDay:-1, questProgress:0, questDone:false, powProg:{}, coach:false, tut:false, lastGroveLevel:0, run:null };
  try{
    let p = JSON.parse(localStorage.getItem("worddrop_v3"));
    if(!p){ // fresh brand: keep the grove & habits worth carrying, but relearn the powers
      const v2 = JSON.parse(localStorage.getItem("worddrop_v2")||"null");
      if(v2){ p = { sound:v2.sound, streak:v2.streak, lastDay:v2.lastDay, dailyWordDay:v2.dailyWordDay,
        grove:v2.grove, bestWord:v2.bestWord, tut:v2.tut,
        stats:v2.stats }; }
    }
    const out = Object.assign({}, defaults, p||{});
    out.seenUnlock = out.seenUnlock||{};
    out.stats = Object.assign({}, defaults.stats, out.stats||{});
    out.pow = Object.assign({}, defaults.pow, out.pow||{});
    if(out.pow.laser){ out.pow.oracle=(out.pow.oracle||0)+out.pow.laser; delete out.pow.laser; } // laser retired → oracle
    Object.keys(POW_CAP).forEach(k=>{ out.pow[k]=Math.min(out.pow[k]||0, POW_CAP[k]); }); // caps tightened over time
    out.powProg = out.powProg||{};
    out.grove = out.grove||{};
    return out;
  }catch(e){ return defaults; }

/* =================== STATE =================== */
function newState(level){
  return { level, milestone:isMilestone(level), board:Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    tiles:{}, seq:0, levelScore:0, target:TARGET(level), movesLeft:MOVES(level),
    drops:0, chain:1, maxChain:1, cascadeMax:1,
    deadDrops:0, nudging:false, idleNudges:0, lastAction:Date.now(), clearedThisDrop:false,
    usingPower:null, swapSel:null, revived:false, won:false, newGrove:[], visitor:null, wanderer:null,
    bestWord:"", bestWordPts:0, cur:null, next:null,
    over:false, busy:true, hoverCol:3, killers:{} };
}
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
function drawLetter(){
  let letters=0, vowels=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ const t=S.board[r][c]; if(t&&t.kind==="normal"){ letters++; if(VOWELS.has(t.letter)) vowels++; } }
  if(letters>4 && vowels/letters<0.25 && Math.random()<0.5) return rand(["a","e","i","o"]);
  return FREQ[Math.floor(Math.random()*FREQ.length)];
}
function makePiece(){
  const roll=Math.random();
  const goldP = (S && S.milestone) ? 0.28 : 0.14; // 👑 milestone levels rain gold
  if(roll<0.02)    return {letter:drawLetter(), kind:"shift"};
  if(roll<goldP)   return {letter:riggedLetter(), kind:"gold"};
  return {letter:riggedLetter(), kind:"normal"};
}

/* =================== WORD SCAN =================== */
function cellsToPattern(cells){ return cells.map(t=>t.kind==="wild"?".":t.letter).join(""); }
function matchPattern(pat){
  if(!pat.includes(".")) return COMMON.has(pat) ? pat : null;
  const list = BY_LEN[pat.length]||[], re = new RegExp("^"+pat+"$");
  for(const w of list) if(re.test(w)) return w;
  return null;
}
function scanLine(cellsLine){
  const found=[]; let seg=[];
  const flush=()=>{
    let pos=0;
    while(pos <= seg.length-MIN_LEN){
      let hit=null;
      for(let L=Math.min(seg.length-pos,8); L>=MIN_LEN; L--){
        const cells=seg.slice(pos,pos+L);
        if(cells.every(t=>t.kind==="wild")) continue;
        const w=matchPattern(cellsToPattern(cells));
        if(w){ hit={cells,word:w}; break; }
      }
      if(hit){ found.push(hit); pos += hit.cells.length; }
      else pos++;
    }
    seg=[];
  };
  cellsLine.forEach(t=>{ if(t && !NONWORD.has(t.kind)) seg.push(t); else flush(); });
  flush();
  return found;
}
/* words read like English: left→right and top→bottom. never backwards —
   with swap/transmute/oracle for deliberate construction, backward clears
   are illegible surprises that steal agency, not forgiveness. */
function findWords(){
  const found=[], seen=new Set();
  const push=h=>{
    const key=h.cells.map(t=>t.id).sort().join(",");
    if(seen.has(key)) return;
    seen.add(key); found.push(h);
  };
  for(let r=0;r<ROWS;r++) scanLine(S.board[r]).forEach(push);
  for(let c=0;c<COLS;c++) scanLine(S.board.map(row=>row[c])).forEach(push);
  return found;
}
function wouldClear(piece, c){
  if(piece.kind==="bomb") return null;
  if(S.board[0][c]) return null;
  let land=ROWS-1; while(land>=0 && S.board[land][c]) land--;
  const fake={ id:"fake", letter:piece.kind==="wild"?"?":piece.letter, kind:piece.kind==="wild"?"wild":"normal", r:land, c };
  S.board[land][c]=fake;
  const words=[...scanLine(S.board[land]), ...scanLine(S.board.map(row=>row[c]))];
  S.board[land][c]=null;
  let best=null;
  for(const w of words) if(w.cells.includes(fake) && (!best || w.word.length>best.length)) best=w.word;
  return best;
}
function helpfulByLength(){
  const best={};
  for(let c=0;c<COLS;c++){
    if(S.board[0][c]) continue;
    for(const l of "abcdefghijklmnopqrstuvwxyz"){
      const w=wouldClear({letter:l,kind:"normal"},c);
      if(w && w.length>(best[l]||0)) best[l]=w.length;
    }
  }
  return best;
}
const PRE=(()=>{ const s=new Set();
  COMMON.forEach(w=>{ if(w.length>=4) for(let i=2;i<w.length;i++) s.add(w.slice(0,i)); });
  return s; })();
function builderLetters(){
  const out=new Set();
  for(let c=0;c<COLS;c++){
    if(S.board[0][c]) continue;
    let land=ROWS-1; while(land>=0&&S.board[land][c]) land--;
    let below="";
    for(let r=land+1;r<Math.min(ROWS,land+4);r++){ const t=S.board[r][c]; if(!t||t.kind!=="normal"&&t.kind!=="gold") break; below+=t.letter; }
    let left="";
    for(let cc=c-1;cc>=0&&c-cc<=3;cc--){ const t=S.board[land][cc]; if(!t||t.kind!=="normal"&&t.kind!=="gold") break; left=t.letter+left; }
    for(const l of "abcdefghijklmnopqrstuvwxyz"){
      if(below && PRE.has((l+below).slice(0,4))) out.add(l);
      if(left && PRE.has(left+l)) out.add(l);
    }
  }
  return [...out];
}
function riggedLetter(){
  /* A KIND but not trivial deck. Words should form often — this is cozy, not a crossword.
     Generosity is highest in the early levels and eases as the player finds their feet. */
  if(!S) return drawLetter();
  const gen = S.level<=3 ? 1 : S.level<=6 ? 0.65 : S.level<=12 ? 0.4 : 0.25;
  const best=helpfulByLength();
  const longs=Object.keys(best).filter(l=>best[l]>=4);
  if(longs.length && Math.random()<0.34+0.30*gen) return rand(longs);              // finish a long word
  if(Object.keys(best).length && Math.random()<0.20+0.32*gen) return rand(Object.keys(best)); // finish any word
  const b=builderLetters();
  if(b.length && Math.random()<0.38+0.30*gen) return rand(b);                      // extend a fragment
  return drawLetter();
}

    await wait(320);
    t.inner.classList.remove("morph");
    S.chain=1; S.lastAction=Date.now();
    await Game.resolve();
    S.busy=false;
    UI.all(); saveRun();
    Game.checkEnd();
  },

  async drop(col){
    if(!S||S.over||S.won||S.busy) return;
    Snd.init();
    if(S.board[0][col]){ Snd.reject(); buzz(60);
      boardEl.classList.remove("shake"); void boardEl.offsetWidth; boardEl.classList.add("shake");
      setTimeout(()=>boardEl.classList.remove("shake"),420);
      return; }
    S.busy = true;
    UI.ghost(-1);
    if(!P.coach){ P.coach=true; save(); const h=document.querySelector(".coach"); if(h) h.remove(); }
    let land=ROWS-1; while(land>=0 && S.board[land][col]) land--;
    const power = S.usingPower;
    let piece;
    if(power){ // powerups are free actions — they don't spend a move
      piece = { letter: power==="wild"?"★":"💣", kind:power };
      P.pow[power]--; save();
      Game.cancelMode(); UI.tray();
    } else {
      piece=S.cur; S.cur=S.next; S.next=makePiece();
      S.movesLeft--; // ← the stake. every drop costs one.
    }
    const t = newTile(piece.letter, piece.kind, land, col, false);
    t.el.style.transition="none"; t.el.style.transform=xy(-1.2,col); void t.el.offsetWidth;
    const fallMs = 80 + land*42;
    t.el.style.transition="transform "+fallMs+"ms cubic-bezier(.55,0,.85,.55)";
    t.el.style.transform=xy(land,col);
    Snd.whoosh();
    await wait(fallMs);
    t.el.style.transition="";
    t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
    UI.dust(land,col);
    for(let r=land+1, d=0; r<ROWS; r++, d++){
      const below=S.board[r][col];
      if(below) setTimeout(()=>{ below.inner.classList.add("jostle"); setTimeout(()=>below.inner.classList.remove("jostle"),220); }, 30+d*28);
    }
    Snd.land(land); buzz(12);
    if(piece.kind==="gold") Snd.gold();

    S.cascadeMax=1; S.clearedThisDrop=false; S.lastAction=Date.now();
    if(piece.kind==="bomb"){ await Game.explode(t); }
    S.chain=1;
    await Game.resolve();
    if(S.cascadeMax>=3) Game.earn("oracle", true);

    if(!power){
      // hints are onboarding only (levels 1-2): with real stakes, the game must not solve itself
      if(S.clearedThisDrop){ S.deadDrops=0; S.idleNudges=0; }
      else { S.deadDrops++; if(S.deadDrops>=2){ S.deadDrops=0; if(S.level<=2) setTimeout(()=>UI.nudge(), 350); } }
      S.drops++;
      if(S.drops % 3 === 0){ await Game.stirShifters(); }
    }
    S.busy=false;
    UI.all();
    saveRun();
    Game.checkEnd();
  },

  checkEnd(){
    if(S.over || S.won) return;
    if(S.levelScore >= S.target){ Game.winLevel(); return; }
    if(S.movesLeft <= 0 || boardFull()){ Game.failLevel(); return; }
    if(S.movesLeft <= 3) Snd.danger();
    boardEl.classList.toggle("danger", S.movesLeft<=3);
  },

  async winLevel(){
    S.won=true; S.busy=true;
    // stars are judged on moves left BEFORE they convert to bonus points
    S.stars = S.movesLeft>=6 ? 3 : S.movesLeft>=3 ? 2 : 1;
    const bonus = S.movesLeft*5;
    if(bonus){
      for(let i=0;i<S.movesLeft;i++){
        setTimeout(()=>{ S.levelScore+=5; Snd.tone(880+i*60,{dur:.08,type:"square",gain:.05}); UI.hud(); }, i*90);
      }
      await wait(S.movesLeft*90+250);
    }
    P.level++; P.stats.wins++; P.stats.stars=(P.stats.stars||0)+S.stars; P.run=null;
    if(S.bestWordPts>0) P.bestWord=S.bestWord;
    P.stats.bestChain=Math.max(P.stats.bestChain,S.maxChain);
    // the grove always grows: if you haven't found a friend lately, one wanders in on a win
    const undiscovered = GROVE.filter(g=>!P.grove[g.w]);
    const sinceFind = (P.level-1) - (P.lastGroveLevel||0);
    if(undiscovered.length && (S.newGrove.length===0) && sinceFind>=2){
      const g = undiscovered[Math.floor(Math.random()*undiscovered.length)];
      P.grove[g.w]=Date.now(); P.lastGroveLevel=P.level-1;
      S.wanderer = g;
    } else if(S.newGrove.length){ P.lastGroveLevel=P.level-1; }
    save();
    Game.earn("transmute", true);
    if(S.milestone){ Game.earn("wild", true); Game.earn("bomb", true); } // 👑 milestones pay double
    Snd.levelUp(); UI.confetti(); buzz([50,50,120]);
    if(S.milestone) setTimeout(()=>UI.confetti(), 400);
    await wait(500);
    UI.endCard(true);
  },

  failLevel(){
    S.over=true; P.run=null;
    P.stats.bestChain=Math.max(P.stats.bestChain,S.maxChain);
    save();
    Snd.fail(); buzz([80,60,150]);
    UI.endCard(false);
  },

  extraMoves(){ // once per level: the second chance (future rewarded-ad slot)
    if(!S || S.revived) return;
    S.revived=true; S.over=false;
    $("ov-end").classList.remove("active");
    S.movesLeft += 5;
    Snd.levelUp(); UI.confetti(); buzz([40,60,40]);
    boardEl.classList.toggle("danger", S.movesLeft<=3);
    UI.all(); saveRun();
  },

  share(){
    const txt="🌳 Wordgrove — LV "+S.level+" · "+S.levelScore+" pts · 👑 best word "+(S.bestWord||"—")+"\nplay: sarfrazbaig.github.io/word-drop";
    if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); }
    else if(navigator.clipboard){ navigator.clipboard.writeText(txt); UI.toast("Copied!"); }
  },

  earn(kind, full){
    if(!unlocked(kind)) return; // can't stockpile a power you haven't learned yet
    // powers are EARNED: word-length sources fill a visible charge meter first.
    // full=true (rewards: crates, visitors, quests, daily word, level-ups, discoveries) grants outright.
    const cap = POW_CAP[kind];
    if(!full && POW_NEED[kind]>1){
      P.powProg[kind]=(P.powProg[kind]||0)+1;
      if(P.powProg[kind] < POW_NEED[kind]){
        save(); UI.tray();
        const slot=$("ps-"+kind);
        slot.classList.add("pop"); setTimeout(()=>slot.classList.remove("pop"),480);
        Snd.tone(880,{dur:.08,type:"triangle",gain:.06}); // charge tick — the anticipation half of earning
        return;
      }
      P.powProg[kind]=0;
    }
    if(P.pow[kind]>=cap){ save(); UI.tray(); return; }
    P.pow[kind]++; save();
    const slot=$("ps-"+kind);
    const app=$("app");
    const fly=document.createElement("div");
    fly.textContent = POWERS[kind] ? POWERS[kind].icon : "★";
    fly.style.cssText="position:absolute;z-index:95;font-size:32px;left:48%;top:38%;transition:all .55s cubic-bezier(.45,0,.7,1);pointer-events:none;text-shadow:0 0 14px var(--gold)";
    app.appendChild(fly);
    const ar=app.getBoundingClientRect(), sr=slot.getBoundingClientRect();
    requestAnimationFrame(()=>{ fly.style.left=(sr.left-ar.left+8)+"px"; fly.style.top=(sr.top-ar.top+4)+"px"; fly.style.fontSize="18px"; });
    setTimeout(()=>{ fly.remove(); slot.classList.add("pop"); setTimeout(()=>slot.classList.remove("pop"),480); UI.tray(); Snd.earn(); buzz(15); }, 560);
  },

  visitorBless(){ // the grove pays you back: sky friends give moves, ground friends give powers
    const v=S.visitor;
    const el=$("visitor");
    el.classList.remove("bless"); void el.offsetWidth; el.classList.add("bless");
    Snd.discover(); buzz([25,40,25,60]);
    if(v.z==="sky"){
      S.movesLeft+=2; UI.hud();
      const f=document.createElement("div"); f.className="movesfloat"; f.textContent="+2";
      const mb=$("movesbox").getBoundingClientRect(), ar=$("app").getBoundingClientRect();
      f.style.left=(mb.left-ar.left+mb.width/2-10)+"px"; f.style.top=(mb.top-ar.top)+"px";
      $("app").appendChild(f); setTimeout(()=>f.remove(),1000);
    } else {
      Game.earn(rand(POW_ORDER.filter(unlocked).length?POW_ORDER.filter(unlocked):["swap"]), true);
    }
  },

  recordWord(word, points, chain){
    P.stats.words++;
    // the grove and the daily word must be EARNED: only words YOU made (chain 1 —
    // your drop, your swap) count. lucky cascades score points, not discoveries.
    if(chain===1){
      const g = GROVE_BY_WORD[word.word];
      if(g && !P.grove[g.w]){
        P.grove[g.w]=Date.now();
        S.newGrove.push(g.w);
        UI.discover(g);
        Game.earn("transmute", true);
      }
      const day=Math.floor(Date.now()/864e5);
      if(word.word===dailyWord() && P.dailyWordDay!==day){
        P.dailyWordDay=day;
        Snd.levelUp(); UI.confetti(); buzz([40,60,40,90]);
        const b=document.createElement("div"); b.className="lvlbanner"; b.textContent="📅 ✨ "+word.word.toUpperCase()+" ✨";
        $("app").appendChild(b); setTimeout(()=>b.remove(),1650);
        POW_ORDER.filter(unlocked).slice(0,3).forEach(k=>Game.earn(k, true));
      }
    }
    if(!P.questDone){
      const q=dailyQuest();
      if(q.type==="words") P.questProgress++;
      else if(q.type==="letters") P.questProgress+=word.cells.length;
      else if(q.type==="points") P.questProgress=Math.min(q.target,P.questProgress+points);
      else if(q.type==="long") P.questProgress += word.cells.length>=4 ? 1 : 0;
      if(P.questProgress>=q.target){ P.questProgress=q.target; P.questDone=true; Game.earn(q.reward, true); UI.pillPop("quest"); }
    }
    save();
    UI.cozy();
  },

  async explode(bomb){
    await wait(120);
    Snd.bomb(); buzz([40,30,90]);
    $("boardwrap").classList.add("shake"); setTimeout(()=>$("boardwrap").classList.remove("shake"),450);
    const {r,c}=bomb;
    const sw=document.createElement("div"); sw.className="shockwave"; // it should FEEL like a bomb
    sw.style.width=CELL*2+"px"; sw.style.height=CELL*2+"px";
    sw.style.left=(c*STEP+CELL/2-CELL)+"px"; sw.style.top=(r*STEP+CELL/2-CELL)+"px";
    boardEl.appendChild(sw); setTimeout(()=>sw.remove(),600);
    for(let rr=r-1;rr<=r+1;rr++) for(let cc=c-1;cc<=c+1;cc++){
      if(rr<0||rr>=ROWS||cc<0||cc>=COLS) continue;
      const t=S.board[rr][cc]; if(t) removeTile(t);
    }
    S.levelScore += 10; UI.hud();
    await wait(340);
    await Game.gravity();
  },

  async stirShifters(){
    const shifts=Object.values(S.tiles).filter(t=>t.kind==="shift");
    if(!shifts.length) return;
    shifts.forEach((t,i)=>{
      setTimeout(()=>{
        t.inner.classList.add("shiftspin");
        Snd.tone(600+i*120,{dur:.14,type:"triangle",gain:.06,verb:true});
        setTimeout(()=>{
          t.letter=drawLetter();
          t.inner.innerHTML = t.letter.toUpperCase()+"<small>"+VAL[t.letter]+"</small>";
        },270);
        setTimeout(()=>t.inner.classList.remove("shiftspin"),560);
      }, i*110);
    });
    await wait(shifts.length*110+620);
    S.chain=1;
    await Game.resolve();
  },

  async resolve(){
    const words = findWords();
    if(!words.length) return;
    S.clearedThisDrop = true;
    if(S.chain>=2){
      const cb=document.createElement("div"); cb.className="chainburst";
      cb.textContent="CHAIN ×"+S.chain+"!";
      $("boardwrap").appendChild(cb); setTimeout(()=>cb.remove(),950);
      Snd.chainBig(S.chain); buzz([30,40,30,80]);
      if(S.chain>=3) UI.confetti();
      await wait(400);
    }
    const allCells = new Set();
    let gained=0;
    for(const w of words){
      const len=w.cells.length;
      let pts=0;
      w.cells.forEach(t=>{ let v = t.kind==="wild"?0:VAL[t.letter]; if(t.kind==="gold") v*=3; pts+=v; });
      pts = Math.round(pts * (1+0.5*(len-3)) * S.chain);
      gained += pts;
      const banner=document.createElement("div"); banner.className="wordbanner";
      banner.style.fontSize = Math.min(16+len*2, 28)+"px";
      boardEl.appendChild(banner); // lives INSIDE the board frame — cannot collide with HUD or pills
      const base = Math.min(4+(S.chain-1)*2, Snd.PENTA.length-len);
      for(let i=0;i<len;i++){
        const t=w.cells[i];
        t.inner.classList.add("lit"); allCells.add(t);
        banner.textContent = w.word.slice(0,i+1).toUpperCase();
        Snd.tone(Snd.PENTA[Math.min(base+i,Snd.PENTA.length-1)]*(0.995+Math.random()*0.01),
          {dur:.18,type:"triangle",gain:.12,verb:true});
        buzz(8);
        await wait(165);
      }
      banner.textContent = w.word.toUpperCase()+"  +"+pts+(S.chain>=2 ? "  ×"+S.chain : "");
      banner.classList.add("done");
      Snd.tone(Snd.PENTA[Math.min(base+len,Snd.PENTA.length-1)]*2,{dur:.32,type:"sine",gain:.06,verb:true});
      if(pts>S.bestWordPts){ S.bestWordPts=pts; S.bestWord=w.word.toUpperCase(); }
      if(len>=5){ Game.earn("bomb"); UI.confetti(); }
      else if(len>=4) Game.earn("wild");
      else Game.earn("swap"); // 3-letter words are fuel: they buy you board rearrangement
      if(len>=4 && S.visitor && !S.visitor.used){ S.visitor.used=true; Game.visitorBless(); }
      Game.recordWord(w, pts, S.chain);
      await wait(700);
      banner.classList.add("fade"); setTimeout(()=>banner.remove(),450);
    }
    S.maxChain=Math.max(S.maxChain,S.chain);
    S.cascadeMax=Math.max(S.cascadeMax,S.chain);
    if(S.chain>=2){ boardEl.classList.add("flash"); setTimeout(()=>boardEl.classList.remove("flash"),400); }
    S.levelScore += gained;
    UI.hud();
    await wait(150);
    const clearedPos=[...allCells].map(t=>({r:t.r,c:t.c}));
    allCells.forEach(t=>removeTile(t));
    Snd.collapse(allCells.size);
    await wait(220);
    await Game.hitNeighbors(clearedPos);
    await Game.gravity();
    // one honest rain tile: cascade potential, never a gift
    await Game.rain(1);
    S.chain++;
    Snd.riser(S.chain);
    await wait(430);
    await Game.resolve();
  },

  async hitNeighbors(cells){ // clearing beside stone cracks it, beside ice thaws it, beside a crate pops it
    const seen=new Set(); let acted=false;
    for(const p of cells){
      for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
        const r=p.r+d[0], c=p.c+d[1];
        if(r<0||r>=ROWS||c<0||c>=COLS) continue;
        const t=S.board[r][c];
        if(!t || seen.has(t.id)) continue;
        seen.add(t.id);
        if(t.kind==="stone"){
          acted=true;
          t.cracks=(t.cracks||0)+1;
          if(t.cracks>=2){ removeTile(t); S.levelScore+=5; Snd.crack(true); }
          else {
            t.inner.classList.add("cracked");
            t.inner.classList.add("jostle"); setTimeout(()=>t.inner.classList.remove("jostle"),220);
            Snd.crack(false);
          }
          buzz(15);
        } else if(t.kind==="ice"){
          acted=true;
          t.kind="normal";
          t.inner.className="tile thawpop"; t.inner.innerHTML=tileFace(t);
          setTimeout(()=>t.inner.classList.remove("thawpop"),560);
          UI.shards(t.r,t.c,"#a8dcf5");
          Snd.thaw(); buzz(10);
        } else if(t.kind==="crate"){
          acted=true;
          removeTile(t);
          Game.earn(rand(POW_ORDER.filter(unlocked).length?POW_ORDER.filter(unlocked):["swap"]), true);
          Snd.gold(); buzz([15,25]);
        }
      }
    }
    if(acted){ UI.hud(); await wait(340); }
  },

  async rain(count){
    for(let i=0;i<count;i++){
      const open=[];
      for(let c=0;c<COLS;c++){ let land=ROWS-1; while(land>=0&&S.board[land][c])land--; if(land>=2) open.push({c,land}); }
      if(!open.length) return;
      const p=open[Math.floor(Math.random()*open.length)];
      const t=newTile(drawLetter(),"normal",p.land,p.c,false);
      t.el.style.transition="none"; t.el.style.transform=xy(-1.2,p.c); void t.el.offsetWidth;
      const ms=70+p.land*32;
      t.el.style.transition="transform "+ms+"ms cubic-bezier(.55,0,.85,.55)";
      t.el.style.transform=xy(p.land,p.c);
      Snd.tone(520+Math.random()*260,{dur:.06,type:"triangle",gain:.045});
      await wait(ms);
      t.el.style.transition="";
      t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
      UI.dust(p.land,p.c);
    }
    await wait(160);
  },

  async gravity(){
    let moved=false;
    for(let c=0;c<COLS;c++){
      const stack=[];
      for(let r=ROWS-1;r>=0;r--){ const t=S.board[r][c]; if(t) stack.push(t); S.board[r][c]=null; }
      stack.forEach((t,i)=>{
        const nr=ROWS-1-i;
        const dist = nr - t.r;
        const falling = dist>0;
        if(falling) moved=true;
        S.board[nr][c]=t; t.r=nr; t.c=c;
        setTimeout(()=>{
          if(falling){ t.el.style.transition="transform "+(90+dist*55)+"ms cubic-bezier(.55,0,.85,.6)"; }
          t.el.style.transform=xy(nr,c);
          if(falling) setTimeout(()=>{ t.el.style.transition="";
            t.inner.classList.add("landsquash"); setTimeout(()=>t.inner.classList.remove("landsquash"),400);
          }, 90+dist*55);
        }, i*24);
      });
    }
    if(moved) await wait(340);
  },
};
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

  TUT:[
    '<div class="big">🌳</div><p>Welcome to <b>Wordgrove</b>.<br>A cozy little word garden.</p><small>drop letters, spell words, grow a grove</small>',

  tutNext(){
    Snd.init();
    if(UI._tut < UI.TUT.length-1){ UI.tutShow(UI._tut+1); Snd.tone(660,{dur:.08,type:"triangle",gain:.07}); return; }
    P.tut=true; save();
    $("ov-tut").classList.remove("active");
    if(loadRun()){ fitBoard(); UI.all(); return; }
    Game.startLevel(P.level);
  },
  visitor(){
    const el=$("visitor");
    if(S && S.visitor){ el.textContent=S.visitor.e; el.title=S.visitor.w.toUpperCase(); el.classList.add("here"); }
    else el.classList.remove("here");
  },
  visitorPeek(){ // tap the visitor: it hops and reminds you what it wants
    if(!S || !S.visitor) return;
    const el=$("visitor");
    el.classList.remove("bless"); void el.offsetWidth; el.classList.add("bless");
    Snd.tone(880,{dur:.1,type:"triangle",gain:.06,verb:true});
  },
  discover(g){
    Snd.discover(); buzz([30,50,30,50,90]);
    UI.confetti();
    const b=document.createElement("div"); b.className="discovery";
    b.innerHTML = '<span class="dEmoji">'+g.e+'</span><span class="dSub">joins your grove</span>';
    $("app").appendChild(b);
    setTimeout(()=>b.remove(), 2100);
  },
  groveShow(){
    $("gr-count").textContent = Object.keys(P.grove).length+"/"+GROVE.length;
    $("gr-daily").textContent = P.dailyWordDay===Math.floor(Date.now()/864e5) ? "✓" : "?";
    const f=$("grovefield"); f.innerHTML="";
    // a tidy collection: sky friends in two neat rows up top, ground friends in ranks on the grass.
    // every friend owns a fixed spot — silhouette today, colour the day you spell it.
    const place=(g, col, row, startTop, rowGap)=>{
      const found=!!P.grove[g.w];
      const el=document.createElement("div");
      el.className="grovemoji"+(found?"":" locked");
      el.innerHTML='<span class="gm">'+g.e+"</span>"+(found?"":'<span class="qm">?</span>');
      el.title = found ? g.w.toUpperCase() : "???"; // never leak the word — the hunt IS the game
      el.style.left = (7 + col*15.4)+"%";
      el.style.top = (startTop + row*rowGap)+"%";
      el.style.fontSize = "25px";
      el.style.animationDelay = (col*0.3 + row*0.5)+"s";
      f.appendChild(el);
    };
    const sky=GROVE.filter(g=>g.z==="sky"), ground=GROVE.filter(g=>g.z!=="sky");
    sky.forEach((g,i)=>place(g, i%6, Math.floor(i/6), 6, 12));
    ground.forEach((g,i)=>place(g, i%6, Math.floor(i/6), 44, 11));
    UI.scene("scene-grove");
  },
  statsShow(){
    $("st-level").textContent=P.level;
    $("st-wins").textContent=P.stats.wins;
    $("st-words").textContent=P.stats.words;
    $("st-streak").textContent=P.streak||0;
    $("st-chain").textContent="×"+P.stats.bestChain;
    $("st-word").textContent=P.bestWord||"—";
    $("m-stats").classList.add("active");
  },
  statsHide(e){
    // close only from the backdrop or the ✓ button — clicks INSIDE the card must not bubble into a close
    if(e && e.target.closest(".card")) return;
    $("m-stats").classList.remove("active");
  },
  nudge(){
    if(!S || S.busy || S.over || S.won || S.nudging) return;
    S.nudging=true;
    UI.hints();
    setTimeout(()=>{
      S.nudging=false;
      document.querySelectorAll(".killcell").forEach(e=>{ e.style.opacity=0; setTimeout(()=>e.remove(),520); });
      const ct=document.querySelector("#currentwrap .tile"); if(ct) ct.classList.remove("glint");
      S.killers={};
    }, 2400);
  },
  hadKillers:false,
  hints(){
    S.killers={};
    document.querySelectorAll(".killcell").forEach(e=>e.remove());
    const piece = S.usingPower==="wild" ? {letter:"★",kind:"wild"} : S.cur;
    const reveal = S.nudging || S.usingPower==="wild";
    const scanning = reveal && !S.over && !S.won && !S.busy && (!S.usingPower || S.usingPower==="wild");
    if(scanning){
      for(let c=0;c<COLS;c++){
        const w=wouldClear(piece,c);
        if(w){
          S.killers[c]=w;
          let land=ROWS-1; while(land>=0 && S.board[land][c]) land--;
          const m=document.createElement("div"); m.className="killcell";
          m.style.width=CELL+"px"; m.style.height=CELL+"px";
          m.style.left=(c*STEP)+"px"; m.style.top=(land*STEP)+"px";
          boardEl.appendChild(m);
        }
      }
    }
    const n=Object.keys(S.killers).length;
    if(n && !UI.hadKillers){
      Snd.tone(1319,{dur:.14,type:"sine",gain:.05,verb:true});
      Snd.tone(1760,{dur:.2,type:"sine",gain:.04,when:.09,verb:true});
    }
    UI.hadKillers = n>0;
  },
  tray(){
    POW_ORDER.forEach(k=>{
      const el=$("ps-"+k);
      const lock = !unlocked(k);
      el.classList.toggle("locked", lock);
      el.querySelector(".cnt").textContent = lock ? "" : P.pow[k];
      el.querySelector(".ic").textContent = lock ? "🔒" : POWERS[k].icon;
      el.querySelector(".req").textContent = lock ? ("LV"+POW_UNLOCK[k]) : POW_REQ[k];
      el.classList.toggle("has", !lock && P.pow[k]>0);
      el.classList.toggle("armed", S && S.usingPower===k);
      const pr=el.querySelector(".prog");
      if(pr){ pr.style.display = (lock||P.pow[k]>=POW_CAP[k]) ? "none":"block"; pr.classList.toggle("half", (P.powProg[k]||0)>0); }
    });
  },
  shards(r,c,color){
    for(let i=0;i<6;i++){
      const s=document.createElement("div"); s.className="shard";
      s.style.background=color;
      s.style.left=(c*STEP+CELL/2)+"px"; s.style.top=(r*STEP+CELL/2)+"px";
      s.style.setProperty("--dx",(Math.random()*110-55)+"px");
      s.style.setProperty("--dy",(Math.random()*-90-15)+"px");
      boardEl.appendChild(s); setTimeout(()=>s.remove(),580);
    }
  },
  dust(r,c){
    for(let i=0;i<4;i++){
      const d=document.createElement("div"); d.className="dust";
      d.style.left=(c*STEP + 6 + Math.random()*(CELL-12))+"px";
      d.style.top=(r*STEP + CELL - 6)+"px";
      d.style.setProperty("--dx",(Math.random()*44-22)+"px");
      d.style.setProperty("--dy",(-6-Math.random()*16)+"px");
      boardEl.appendChild(d); setTimeout(()=>d.remove(),480);
    }
  },
  ghostEl:null,
  ghost(col){
    if(this.ghostEl){ if(this.ghostEl._label) this.ghostEl._label.remove(); this.ghostEl.remove(); this.ghostEl=null; }
    if(!S || col<0 || S.over || S.won || S.busy) return;
    if(S.usingPower==="transmute" || S.usingPower==="swap") return; // these target tiles, not columns
    if(S.board[0][col]) return;
    let land=ROWS-1; while(land>=0 && S.board[land][col]) land--;
    const g=document.createElement("div");
    g.className="tile ghost"; g.style.width=CELL+"px"; g.style.height=CELL+"px"; g.style.fontSize="20px";
    const pk=S.usingPower;
    g.textContent = pk==="bomb"?"💣" : pk==="wild"?"★"
      : (S.cur.kind==="bomb"?"💣":S.cur.kind==="wild"?"★":S.cur.letter.toUpperCase());
    g.style.transform=xy(land,col);
    boardEl.appendChild(g); this.ghostEl=g;
    if(S.killers[col]){
      const dl=document.createElement("div"); dl.className="droplabel";
      dl.textContent = S.killers[col].toUpperCase();
      dl.style.left=(col*STEP+CELL/2)+"px"; dl.style.top=(land*STEP)+"px";
      boardEl.appendChild(dl); g._label=dl;
    }
  },
  toast(m){ const t=$("toast"); t.textContent=m; t.style.opacity=1; clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity=0,1500); },
  confetti(){
    const colors=["#7dd87d","#ffd54f","#4fc3f7","#ff8a5c","#b388ff"];
    for(let i=0;i<24;i++){ const c=document.createElement("div"); c.className="confetti";
      c.style.left=Math.random()*100+"%"; c.style.background=colors[i%colors.length];
      c.style.animationDelay=(Math.random()*0.3)+"s";
      $("app").appendChild(c); setTimeout(()=>c.remove(),1900); }
  },
  all(){ UI.hud(); UI.piece(); UI.hints(); UI.tray(); UI.cozy(); },
};

/* =================== LAYOUT & INPUT =================== */
function fitBoard(){
  const wrap=$("boardwrap");
  if(!wrap.clientWidth) return;
  const bw=COLS*STEP-GAP, bh=ROWS*STEP-GAP;
  const k=Math.min(1.1, (wrap.clientWidth-4)/bw, (wrap.clientHeight-14)/bh);
  boardEl.style.transform="scale("+k+")";
  boardEl.style.transformOrigin="center center";
}
function fitApp(){ // scale the fixed 396×800 stage to whatever screen we're on (transform-centered — immune to overflow clipping)
  const k=Math.min(1, innerWidth/396, innerHeight/800);
  $("app").style.transform = "translate(-50%,-50%) scale("+k+")";
}
window.addEventListener("resize", ()=>{ fitApp(); fitBoard(); });
setInterval(fitApp, 900); // some webviews don't fire resize reliably — cheap insurance
function colFromEvent(e){
  const r=boardEl.getBoundingClientRect();
  const x=e.clientX-r.left;
  if(x<0||x>r.width) return -1;
  return Math.max(0,Math.min(COLS-1,Math.floor(x/(r.width/COLS))));
}
boardEl.addEventListener("pointermove", e=>{
  if(!S) return;
  const c=colFromEvent(e);
  if(c>=0 && c!==S.hoverCol){ Snd.hover(c); }
  S.hoverCol=c; UI.ghost(c);
});
boardEl.addEventListener("pointerleave", ()=>UI.ghost(-1));
boardEl.addEventListener("pointerdown", e=>{ if(!S) return; const c=colFromEvent(e); S.hoverCol=c; UI.ghost(c); });
boardEl.addEventListener("pointerup", e=>{
  if(!S) return;
  if(S.usingPower==="transmute" || S.usingPower==="swap"){
    const r=boardEl.getBoundingClientRect();
    const col=Math.max(0,Math.min(COLS-1,Math.floor((e.clientX-r.left)/(r.width/COLS))));
    const row=Math.max(0,Math.min(ROWS-1,Math.floor((e.clientY-r.top)/(r.height/ROWS))));
    if(!S.busy && !S.over && !S.won){
      if(S.usingPower==="transmute") Game.transmuteAt(row,col);
      else Game.swapAt(row,col);
    }
    return;
  }
  const c=colFromEvent(e);
  if(c>=0) Game.drop(c);
});
document.addEventListener("pointerdown", ()=>Snd.init(), {once:true});

/* idle life */
setInterval(()=>{
  if(!S || S.over || S.won || S.busy) return;
  if(!$("scene-game").classList.contains("active")) return;
  const tiles = Object.values(S.tiles);
  if(!tiles.length) return;
  const t = tiles[Math.floor(Math.random()*tiles.length)];
  const fx = Math.random()<0.5 ? "glint" : "breathe";
  t.inner.classList.add(fx);
  setTimeout(()=>t.inner.classList.remove(fx), 780);
}, 2400);

/* stuck nudge — onboarding only: after level 2 the player is on their own */
setInterval(()=>{
  if(!S || S.level>2 || S.over || S.won || S.busy || S.nudging || S.idleNudges>=2) return;
  if(!$("scene-game").classList.contains("active")) return;
  if(Date.now()-S.lastAction > 8000){
    S.idleNudges++;
    S.lastAction = Date.now();
    UI.nudge();
  }
}, 1000);

/* boot */
fitApp();
UI.home();
document.querySelectorAll(".soundbtn").forEach(el=>el.textContent = P.sound?"🔊":"🔇");
Snd.on = P.sound;
window.S = ()=>S; window.Game=Game; window.UI=UI; window.Snd=Snd; window.P=P;
// installable + offline: register the service worker (silent, non-blocking)
if("serviceWorker" in navigator){ window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
